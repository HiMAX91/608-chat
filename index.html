<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>蒲公英</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="蒲公英">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDFAF2;--gold:#D4A017;--gold-l:#E8B84B;--gold-p:#FBF5DC;
  --brown:#3D2C1A;--bm:#7A5C3A;--bl:#C8A882;--sh:rgba(61,44,26,.10);
  --bg-card:rgba(255,255,255,.9);--bg-input:rgba(255,248,220,.3);
  --bg-input-f:rgba(255,248,220,.7);--bg-hdr:rgba(255,255,255,.88);
  --bbl-other:#fff;--bbl-self:#FFF8DC;
}

[data-theme="dark"] {
  --cream:#1F160E;--gold:#E8B84B;--gold-l:#F5D382;--gold-p:#362719;
  --brown:#F5EFEB;--bm:#D1BAA3;--bl:#A38563;--sh:rgba(0,0,0,.4);
  --bg-card:rgba(43,31,20,.95);--bg-input:rgba(61,44,26,.5);
  --bg-input-f:rgba(77,56,34,.8);--bg-hdr:rgba(31,22,14,.92);
  --bbl-other:#2D1F14;--bbl-self:#4A3622;
}

html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--brown);transition:background .3s, color .3s}

/* 種子 */
#seeds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.seed{position:absolute;bottom:-20px;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{bottom:-20px;opacity:0;transform:translateX(0) rotate(0deg)}10%{opacity:.6}90%{opacity:.4}100%{bottom:110vh;opacity:0;transform:translateX(var(--dx)) rotate(400deg)}}

/* 畫面基礎隱藏切換機制 */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .35s,transform .35s;background:var(--cream)}
.scr.off{opacity:0!important;pointer-events:none!important;transform:translateY(14px)!important}

/* ══ 首頁 ══ */
#s-home{gap:28px;padding:24px;z-index:11}
.logo-wrap{animation:sway 4s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.big-title{font-family:'Noto Serif TC',serif;font-size:52px;letter-spacing:10px}
.big-sub{font-size:13px;color:var(--bl);letter-spacing:3px}
.home-btns{display:flex;gap:14px;margin-top:4px;z-index:20;pointer-events:auto;}
.pill{padding:14px 42px;border-radius:50px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;border:none;letter-spacing:2px;transition:all .2s;user-select:none;-webkit-user-select:none;}
.pill.pri{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;box-shadow:0 4px 18px rgba(212,160,23,.4)}
.pill.pri:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(212,160,23,.5)}
.pill.sec{background:var(--bg-card);color:var(--bm);border:1.5px solid rgba(212,160,23,.4)}
.pill.sec:hover{background:var(--gold-p)}

/* ══ 步驟頁 ══ */
#s-steps{justify-content:flex-start;padding:0;z-index:12}
.stp-bar{width:100%;max-width:480px;display:flex;align-items:center;padding:20px 20px 0;flex-shrink:0}
.bk-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-card);border:1.5px solid rgba(212,160,23,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bm);transition:all .2s}
.bk-btn:hover{background:var(--gold-p)}
.dots{display:flex;gap:6px;margin-left:auto}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(212,160,23,.25);transition:all .3s}
.dot.on{background:var(--gold);width:20px}

.stp-body{flex:1;width:100%;max-width:480px;padding:14px 22px 22px;overflow:hidden}
.card{background:var(--bg-card);border:1px solid rgba(212,160,23,.2);border-radius:28px;padding:36px 30px 28px;box-shadow:0 6px 36px var(--sh);animation:cIn .32s cubic-bezier(.34,1.3,.64,1);width:100%}
.card.rev{animation:cInR .32s cubic-bezier(.34,1.3,.64,1)}
@keyframes cIn {from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes cInR{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}

.c-lbl{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--bl);margin-bottom:8px}
.c-ttl{font-family:'Noto Serif TC',serif;font-size:22px;margin-bottom:6px}
.c-hint{font-size:12px;color:var(--bl);line-height:1.8;margin-bottom:22px}

/* 大頭貼 */
.av-zone{display:flex;justify-content:center;margin:4px 0 18px}
.av-btn{width:96px;height:96px;border-radius:50%;background:var(--gold-p);border:2.5px dashed rgba(212,160,23,.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .2s;overflow:hidden}
.av-btn:hover{border-color:var(--gold);transform:scale(1.04)}
.av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.av-cam{font-size:28px}.av-lbl{font-size:11px;color:var(--bl)}
#av-file{display:none}

/* 輸入 */
.fi{width:100%;padding:14px 18px;border:1.5px solid rgba(212,160,23,.3);border-radius:16px;font-family:inherit;font-size:16px;color:var(--brown);background:var(--bg-input);outline:none;transition:all .2s}
.fi:focus{border-color:var(--gold);background:var(--bg-input-f);box-shadow:0 0 0 3px rgba(212,160,23,.12)}
.fi::placeholder{color:var(--bl)}
.ferr{font-size:12px;color:#C0392B;margin-top:10px;min-height:16px}

.nr{display:flex;justify-content:flex-end;margin-top:22px}
.nb{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(212,160,23,.4);transition:all .2s}
.nb:hover{transform:scale(1.1)}
.nb svg{width:22px;height:22px;fill:#fff}
.nb:disabled{opacity:.5;cursor:default}

/* ══ 聊天 ══ */
#s-chat{flex-direction:column;justify-content:flex-start;padding:0;overflow:hidden;align-items:stretch;z-index:13}
.c-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,160,23,.15);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.c-hdr-l{display:flex;align-items:center;gap:10px}
.c-hdr-t{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:4px}
.my-chip{display:flex;align-items:center;gap:8px;cursor:pointer}
.hav{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;position:relative;border:1px solid rgba(212,160,23,.2)}
.hav img{width:100%;height:100%;object-fit:cover}
.hname-box{display:flex;flex-direction:column}
.hname{font-size:14px;color:var(--brown);font-weight:500;line-height:1.2}
.hbio-sub{font-size:11px;color:var(--bl);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:10px}
@media(max-width:600px){.msgs{padding:14px 14px}}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(212,160,23,.3);border-radius:2px}
.wlc{text-align:center;padding:20px;color:var(--bl);font-size:13px;line-height:2}
.wlc span{font-size:30px;display:block;margin-bottom:8px}

/* 訊息元件排版 */
.mw{position:relative;display:flex;flex-direction:column;max-width:68%;animation:mIn .22s ease;}
@media(max-width:600px){.mw{max-width:85%}}
@keyframes mIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mw.self{align-self:flex-end;align-items:flex-end}
.mw.other{align-self:flex-start;align-items:flex-start}
.mw-nm{font-size:11px;color:var(--bl);margin-bottom:3px;padding:0 4px}

.mw-row{display:flex;align-items:flex-end;gap:7px;max-width:100%;position:relative;}
.mw.self .mw-row{flex-direction:row-reverse}
.mav{width:32px;height:32px;border-radius:50%;overflow:hidden;background:var(--gold-p);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(212,160,23,.15)}
.mav img{width:100%;height:100%;object-fit:cover}

/* 對話框本體 */
.bbl{padding:10px 15px;border-radius:20px;font-size:15px;line-height:1.6;color:var(--brown);word-break:break-word;position:relative;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.mw.self .bbl{background:var(--bbl-self);border:1px solid rgba(212,160,23,.25);border-bottom-right-radius:5px}
.mw.other .bbl{background:var(--bbl-other);border:1px solid rgba(61,44,26,.08);border-bottom-left-radius:5px;box-shadow:0 2px 8px var(--sh)}
.bbl.recalled{background:transparent!important;border:1px dashed rgba(200,168,130,.4)!important;color:var(--bl)!important;font-style:italic;box-shadow:none!important;display:block;}
.bbl img{max-width:100%;max-height:220px;border-radius:12px;display:block;cursor:zoom-in}
.flink{display:flex;align-items:center;gap:7px;color:var(--gold);text-decoration:none;font-size:13px;font-weight:500}
.mw-t{font-size:10px;color:var(--bl);margin-top:3px;padding:0 4px}

/* 回覆小卡 */
.quote-box{background:rgba(212,160,23,.08);border-left:3px solid var(--gold);padding:4px 8px;border-radius:6px;font-size:12px;color:var(--bm);margin-bottom:6px;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;transition:background .2s}
.quote-box:hover{background:rgba(212,160,23,.15)}

/* 絕對定位操作按鈕群 */
.hvr-actions{
  position: absolute;
  bottom: calc(100% + 4px); 
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 50;
}
.mw.self .hvr-actions { right: 40px; transform: translateY(3px); }
.mw.other .hvr-actions { left: 40px; transform: translateY(3px); }
.mw:hover .hvr-actions, .mw.show-menu .hvr-actions{ opacity: 1; pointer-events: auto; transform: translateY(0); }
.action-btn{background:var(--bg-card);border:1px solid rgba(212,160,23,.3);border-radius:10px;padding:5px 11px;font-size:12px;color:var(--bm);cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .2s;box-shadow: 0 2px 8px var(--sh);}
.action-btn:hover{background:var(--gold-p);border-color:var(--gold);}

.sysmsg{text-align:center;font-size:12px;color:var(--bl);padding:3px 16px}
.sysmsg span{background:rgba(245,230,163,.25);padding:3px 12px;border-radius:20px}

/* 輸入區域與回覆預覽列 */
.inp-area{flex-shrink:0;padding:12px 28px 20px;background:var(--bg-hdr);border-top:1px solid rgba(212,160,23,.12);display:flex;flex-direction:column;gap:8px}
@media(max-width:600px){.inp-area{padding:10px 14px 16px}}

.reply-bar{display:none;background:var(--bg-card);border:1px solid rgba(212,160,23,.2);border-radius:12px;padding:6px 14px;align-items:center;justify-content:space-between;font-size:13px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.reply-bar-info{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--bm)}
.reply-bar-close{background:none;border:none;font-size:16px;color:var(--bl);cursor:pointer;margin-left:10px}

.inp-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg-card);border:1.5px solid rgba(212,160,23,.3);border-radius:26px;padding:8px 8px 8px 12px;box-shadow:0 2px 10px var(--sh);transition:border-color .2s}
.inp-row:focus-within{border-color:var(--gold)}
.att-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;flex-shrink:0}
.att-btn:hover{background:var(--gold-p)}
.att-btn svg{width:20px;height:20px;stroke:var(--bl);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#fi2{display:none}
.msg-ta{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--brown);background:transparent;resize:none;max-height:100px;line-height:1.5;padding:5px 0}
.msg-ta::placeholder{color:var(--bl)}
.snd-btn{width:40px;height:40px;flex-shrink:0;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-l));cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(212,160,23,.4);transition:all .2s}
.snd-btn:hover{transform:scale(1.08)}
.snd-btn svg{width:17px;height:17px;fill:#fff}

/* 設置面板 */
#setting-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.set-card{width:90%;max-width:380px;background:var(--bg-card);border:1px solid rgba(212,160,23,.25);border-radius:24px;padding:28px 24px;box-shadow:0 10px 40px var(--sh);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.set-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.set-t{font-family:'Noto Serif TC',serif;font-size:20px}
.set-close{background:none;border:none;font-size:22px;color:var(--bl);cursor:pointer}
.set-item{margin-bottom:16px}
.set-lbl{font-size:12px;font-weight:500;color:var(--bl);margin-bottom:6px;letter-spacing:1px}
.theme-options{display:flex;gap:10px}
.t-opt{flex:1;padding:10px;border-radius:12px;border:1.5px solid rgba(212,160,23,.3);background:transparent;color:var(--brown);cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s;text-align:center}
.t-opt.active{background:var(--gold-p);border-color:var(--gold);font-weight:500}

/* 裁切器 */
#crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.crop-box-wrap{position:relative;width:280px;height:280px;overflow:hidden;background:#111;border-radius:12px}
#crop-img{position:absolute;top:0;left:0;transform-origin:0 0;cursor:move;user-select:none;touch-action:none}
.crop-mask{position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 999px rgba(0,0,0,.6);pointer-events:none;border:2px solid var(--gold)}
.crop-tips{color:#fff;font-size:12px;margin:14px 0 20px;opacity:.7;letter-spacing:1px}
.crop-btns{display:flex;gap:12px;width:100%;max-width:280px}
.c-btn{flex:1;padding:12px;border-radius:30px;font-family:inherit;font-size:14px;border:none;cursor:pointer;font-weight:500}
.c-btn.cancel{background:rgba(255,255,255,.15);color:#fff}
.c-btn.save{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff}

#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;align-items:center;justify-content:center;cursor:zoom-out}
#lb img{max-width:92vw;max-height:92vh;border-radius:12px}

/* 加入主畫面引導 */
#install-banner{position:fixed;inset:0;z-index:999;pointer-events:none;display:none}
.ib-card{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg-card);border-radius:20px;padding:20px 22px 18px;box-shadow:0 8px 40px var(--sh);border:1px solid rgba(212,160,23,.3);width:calc(100% - 40px);max-width:360px;pointer-events:all;animation:popIn .4s cubic-bezier(.34,1.4,.64,1)}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) scale(.92)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.ib-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ib-title{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--brown);font-weight:700;display:flex;align-items:center;gap:8px}
.ib-close{background:none;border:none;width:28px;height:28px;border-radius:50%;background:rgba(200,168,130,.2);color:var(--bl);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ib-steps{display:flex;flex-direction:column;gap:10px}
.ib-step{display:flex;align-items:center;gap:12px;background:var(--gold-p);border-radius:12px;padding:10px 14px}
.ib-step-num{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib-step-txt{font-size:13px;color:var(--brown);line-height:1.5}
.ib-step-txt b{color:var(--gold)}
.ib-pointer{position:absolute;bottom:12px;right:28px;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
.ib-pointer-txt{font-size:11px;color:var(--bm);font-weight:500;background:var(--bg-card);padding:3px 8px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);white-space:nowrap}
.ib-pointer-arrow{font-size:28px;animation:arrowBounce .7s ease-in-out infinite alternate}
@keyframes arrowBounce{from{transform:translateY(0)}to{transform:translateY(8px)}}
</style>
</head>
<body>
<div id="seeds"></div>

<audio id="bg-music" loop preload="auto">
  <source src="Summer.mp3" type="audio/mpeg">
</audio>

<div class="scr" id="s-home">
  <div class="logo-wrap">
    <svg width="78" height="90" viewBox="0 0 90 100" fill="none">
      <path d="M45 98 Q43 70 45 50" stroke="#5C8A3C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M45 75 Q35 68 28 62" stroke="#5C8A3C" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <g transform="translate(45,34)">
        <line x1="0" y1="0" x2="0" y2="-22" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="0" cy="-22" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="16" y2="-16" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="16" y1="-16" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="22" y2="0" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="22" cy="0" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="16" y2="16" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="16" cy="16" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="0" y2="22" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="0" cy="22" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="-16" y2="16" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="-16" cy="16" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="-22" y2="0" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="-22" cy="0" r="3" fill="#E8B84B"/>
        <line x1="0" y1="0" x2="-16" y2="-16" stroke="#D4A017" stroke-width="1" opacity=".6"/><circle cx="-16" cy="-16" r="3" fill="#E8B84B"/>
        <circle cx="0" cy="0" r="6" fill="#D4A017"/><circle cx="0" cy="0" r="3.5" fill="#E8B84B"/>
      </g>
    </svg>
  </div>
  <div class="big-title">蒲公英</div>
  <div class="big-sub">我們的故事，隨風飄揚</div>
  <div class="home-btns">
    <button class="pill pri" id="btn-reg">註 冊</button>
    <button class="pill sec" id="btn-log">登 入</button>
  </div>
</div>

<div class="scr off" id="s-steps">
  <div class="stp-bar"><button class="bk-btn" id="bk-btn" onclick="goBack()">←</button><div class="dots" id="dots"></div></div>
  <div class="stp-body" id="stp-body"></div>
</div>

<div class="scr off" id="s-chat">
  <div class="c-hdr">
    <div class="c-hdr-l"><span style="font-size:22px">🌼</span><span class="c-hdr-t">蒲公英</span></div>
    <div class="my-chip" onclick="openSetting()">
      <div class="hav" id="hav"><img id="hav-img" alt="" style="display:none"></div>
      <div class="hname-box"><span class="hname" id="hname"></span><span class="hbio-sub" id="hbio-sub">查看設置...</span></div>
    </div>
