<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>蒲公英 608</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="蒲公英">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
:root{
  --cream:#FDFAF2; --gold:#D4A017; --gold-l:#E8B84B; --gold-p:rgba(212,160,23,0.08);
  --brown:#3D2C1A; --bm:#7A5C3A; --bl:#C8A882; --sh:rgba(61,44,26,0.1);
  
  --bg-card:rgba(255, 255, 255, 0.85); 
  --bg-input:rgba(255, 255, 255, 0.7);
  --bg-input-f:rgba(255, 255, 255, 0.95);
  --bg-hdr:rgba(253, 250, 242, 0.85);
  --bbl-other:#FFFFFF; 
  --bbl-self:#FFF8DC;
  --glass-border: 1px solid rgba(255, 255, 255, 0.6);
  --glass-blur: blur(16px);

  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
}

[data-theme="dark"] {
  --cream:#1F160E; --gold:#E8B84B; --gold-l:#F5D382; --gold-p:rgba(212,160,23,0.15);
  --brown:#F5EFEB; --bm:#D1BAA3; --bl:#A38563; --sh:rgba(0,0,0,0.4);
  
  --bg-card:rgba(43, 31, 20, 0.85); 
  --bg-input:rgba(61, 44, 26, 0.6);
  --bg-input-f:rgba(77, 56, 34, 0.8); 
  --bg-hdr:rgba(31, 22, 14, 0.85);
  --bbl-other:#2D1F14; 
  --bbl-self:#4A3622;
  --glass-border: 1px solid rgba(212, 160, 23, 0.15);
}

html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--brown);transition:background .3s var(--ease-smooth), color .3s var(--ease-smooth)}

.liquid-glass-modal {
  background: var(--bg-card);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border);
  box-shadow: 0 12px 40px var(--sh);
  border-radius: 24px;
  overflow: hidden;
}

#seeds{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.seed{position:absolute;bottom:-20px;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{bottom:-20px;opacity:0;transform:translateX(0) rotate(0deg)}10%{opacity:.6}90%{opacity:.4}100%{bottom:110vh;opacity:0;transform:translateX(var(--dx)) rotate(400deg)}}

.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:10;background:transparent;opacity:1;visibility:visible;pointer-events:auto;transition:opacity .3s var(--ease-smooth), transform .3s var(--ease-smooth), visibility .3s; will-change: transform, opacity;}
.scr.off{opacity:0!important;visibility:hidden!important;pointer-events:none!important;transform:scale(0.97) translateY(15px)!important;}

.pill, .action-btn, .c-btn, .nb, .bk-btn, .snd-btn, .att-btn, .usr-row, .my-chip, .file-box, .t-opt, .post-card, .tab-btn { transition:all .2s var(--ease-smooth); will-change: transform; }
.pill:active, .c-btn:active, .nb:active, .bk-btn:active, .snd-btn:active, .att-btn:active, .usr-row:active, .my-chip:active, .file-box:active, .t-opt:active, .tab-btn:active { transform: scale(0.93) !important; opacity: 0.8; transition: transform 0.1s; }

/* ══ 首頁 ══ */
#s-home{gap:28px;padding:24px;z-index:20; justify-content:center;}
.logo-wrap{animation:sway 4s ease-in-out infinite;transform-origin:bottom center;}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.big-title{font-family:'Noto Serif TC',serif;font-size:52px;letter-spacing:10px;}
.big-sub{font-size:13px;color:var(--bl);letter-spacing:3px}
.home-btns{display:flex;gap:14px;margin-top:4px;z-index:30;pointer-events:auto;}
.pill{padding:14px 42px;border-radius:50px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none;letter-spacing:2px;user-select:none;}
.pill.pri{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;box-shadow:0 6px 18px rgba(212,160,23,.25); border:1px solid rgba(255,255,255,0.2);}
.pill.pri:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(212,160,23,.35)}
.pill.sec{background:var(--bg-input);color:var(--bm);border:1px solid rgba(212,160,23,.3);}
.pill.sec:hover{background:var(--gold-p)}

/* ══ 步驟頁 ══ */
#s-steps{padding:0;z-index:30}
.stp-bar{width:100%;max-width:480px;display:flex;align-items:center;padding:20px 20px 0;flex-shrink:0}
.bk-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-card);border:1px solid rgba(212,160,23,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bm);}
.bk-btn:hover{background:var(--gold-p)}
.dots{display:flex;gap:6px;margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(212,160,23,.25);transition:all .3s var(--ease-spring)}
.dot.on{background:var(--gold);width:22px}
.stp-body{flex:1;width:100%;max-width:480px;padding:14px 22px 22px;overflow:hidden}
.card{border-radius:28px;padding:36px 30px 28px;animation:cIn .4s var(--ease-spring);width:100%; background:var(--bg-card); box-shadow:0 8px 30px var(--sh); border:var(--glass-border);}
.card.rev{animation:cInR .4s var(--ease-spring);}
@keyframes cIn {from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes cInR{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.c-lbl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--bl);margin-bottom:8px}
.c-ttl{font-family:'Noto Serif TC',serif;font-size:24px;margin-bottom:6px}
.c-hint{font-size:13px;color:var(--bl);line-height:1.8;margin-bottom:24px}
.av-zone{display:flex;justify-content:center;margin:4px 0 18px}
.av-btn{width:100px;height:100px;border-radius:50%;background:var(--gold-p);border:2px dashed rgba(212,160,23,.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;overflow:hidden}
.av-btn:hover{border-color:var(--gold);transform:scale(1.03)}
.av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.av-cam{font-size:30px}.av-lbl{font-size:12px;color:var(--bl)}

.fi{width:100%;padding:14px 18px;border:1px solid rgba(212,160,23,.2);border-radius:18px;font-family:inherit;font-size:16px;color:var(--brown);background:var(--bg-input);outline:none;}
.fi:focus{border-color:var(--gold);background:var(--bg-input-f);box-shadow:0 0 0 4px rgba(212,160,23,.15); transform:translateY(-1px);}
.fi::placeholder{color:var(--bl)}
.ferr{font-size:12px;color:#C0392B;margin-top:10px;min-height:16px; font-weight:500;}
.nr{display:flex;justify-content:flex-end;margin-top:24px}
.nb{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(212,160,23,.25);}
.nb:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,160,23,.35);}
.nb svg{width:24px;height:24px;fill:#fff}

/* ══ 主畫面 / 動態牆 共用 Header & 底部導覽列 ══ */
.m-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(212,160,23,.1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:70;}
.m-hdr-t{font-family:'Noto Serif TC',serif;font-size:22px;letter-spacing:2px;font-weight:700}
.my-chip{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;background:var(--gold-p);padding:5px 12px 5px 5px;border-radius:30px;border:1px solid rgba(212,160,23,.15);z-index:90;}
.my-chip:hover{transform:scale(1.03); background:rgba(212,160,23,0.15);}
.hav{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid rgba(212,160,23,.2)}
.hav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hname-box{display:flex;flex-direction:column; pointer-events:none;}
.hname{font-size:14px;color:var(--brown);font-weight:700;line-height:1.2}
.hbio-sub{font-size:11px;color:var(--bl);max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Bottom Navigation Bar */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
  background: var(--bg-hdr); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
  border-top: 1px solid rgba(212,160,23,.15); border-radius: 24px 24px 0 0; display: flex; z-index: 80;
  transition: transform 0.3s var(--ease-smooth); will-change: transform;
}
.bottom-nav.off { transform: translateY(100%); }
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  font-size: 11px; font-weight: 500; color: var(--bl); cursor: pointer; user-select: none;
}
.tab-btn span.icon { font-size: 20px; transition: transform 0.3s var(--ease-spring); }
.tab-btn.active { color: var(--gold); }
.tab-btn.active span.icon { transform: translateY(-3px) scale(1.15); }

/* ══ 聊天列表 (大廳) ══ */
#s-main, #s-feed, #s-board { padding-bottom: 75px; } 
.main-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px 10px;flex-shrink:0;animation:popInMessage .5s var(--ease-spring);}
.main-hero-t{font-family:'Noto Serif TC',serif;font-size:24px;color:var(--brown);letter-spacing:6px;font-weight:700;margin-top:14px;}
.main-hero-s{font-size:12px;color:var(--bl);letter-spacing:4px;margin-top:4px;}

.usr-list-wrap{flex:1;width:100%;overflow-y:auto;padding:10px 20px 20px;display:flex;flex-direction:column;gap:12px;max-width:600px;align-self:center; scroll-behavior:smooth;}
.usr-list-wrap::-webkit-scrollbar{width:0px}
.usr-row{display:flex;align-items:center;gap:14px;padding:14px 18px; border-radius:20px;cursor:pointer;animation:popInMessage .4s var(--ease-spring) both; background: var(--bg-card); border: 1px solid rgba(212,160,23,.15); box-shadow: 0 4px 15px var(--sh);}
.usr-row:nth-child(1) { animation-delay: 0.05s; }
.usr-row:nth-child(2) { animation-delay: 0.1s; }
.usr-row:nth-child(n+3) { animation-delay: 0.15s; }

.usr-row:hover{background:var(--bg-input-f); border-color:var(--gold); transform:translateY(-2px);}
.usr-row.grp{background:linear-gradient(135deg, rgba(245,230,163,0.3), rgba(212,160,23,0.1)); border-color:var(--gold-l);}
.usr-info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.usr-name{font-size:16px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-sub{font-size:12px;color:var(--bl);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-arrow{color:var(--gold);font-weight:700;opacity:0.6;font-size:18px;}
.usr-div{font-size:12px;color:var(--bl);letter-spacing:2px;font-weight:700;margin:12px 0 4px;padding-left:10px;}

/* ══ 動態牆 (Feed) ══ */
.feed-list { flex:1; width:100%; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:20px; max-width:600px; align-self:center; }
.feed-list::-webkit-scrollbar{width:0px}
.post-card { border-radius: 24px; padding: 18px; animation: popInMessage .5s var(--ease-spring) both; background: var(--bg-card); border: 1px solid rgba(212,160,23,.15); box-shadow: 0 6px 20px var(--sh); overflow: hidden; }
.post-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.post-av { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(212,160,23,.2); background:var(--gold-p); }
.post-info { flex: 1; }
.post-name { font-size: 15px; font-weight: 700; color: var(--brown); }
.post-time { font-size: 11px; color: var(--bl); margin-top: 2px; }
.post-text { font-size: 15px; line-height: 1.6; color: var(--brown); margin-bottom: 12px; word-break: break-word; }
.post-media { width: 100%; max-height: 350px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(212,160,23,.1); background:#000; }
.post-img { cursor:zoom-in; transition: transform .2s; }
.post-img:active { transform: scale(0.98); }
.post-ftr { display: flex; align-items: center; justify-content: space-between; border-top: 1px dashed rgba(212,160,23,.2); padding-top: 12px; }
.like-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; font-size: 14px; font-family: inherit; font-weight: 500; color: var(--bm); cursor: pointer; padding: 6px 12px; border-radius: 20px; }
.like-btn:hover { background: var(--gold-p); transform: scale(1.05); }
.like-btn.liked { color: #E74C3C; }
.like-btn.liked span.heart { animation: heartBeat .4s var(--ease-spring); }
@keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
.del-post-btn { color: #C0392B; background: rgba(192, 57, 43, 0.1); border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; }
.del-post-btn:active { transform: scale(0.9); }

/* ══ 白板 (Board) ══ */
.color-btn { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.color-btn:active { transform: scale(0.8); }
.color-btn.active { border-color: rgba(255,255,255,0.9); box-shadow: 0 0 0 2px var(--gold); transform: scale(1.15); }

/* 管理員列表卡片樣式 */
.admin-card { border-radius: 20px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom:12px; background:var(--bg-card); box-shadow:0 4px 15px var(--sh); border:1px solid rgba(212,160,23,.15); }
.admin-info { flex: 1; overflow: hidden; }
.admin-name { font-size: 16px; font-weight: 700; color: var(--brown); margin-bottom: 6px; }
.admin-detail { font-size: 12px; color: var(--bm); font-family: monospace; background: var(--bg-input); padding: 4px 8px; border-radius: 8px; display: inline-block; }

/* ══ 聊天室 ══ */
#s-chat{width:100%; align-items:stretch; padding:0; z-index:90} 
.c-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(212,160,23,.15);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.c-hdr-l{display:flex;align-items:center;gap:12px;padding-left:4px;}
.c-bk{font-size:24px;cursor:pointer;color:var(--gold);padding-right:6px;font-weight:700;}
.c-bk:active{transform:translateX(-6px) scale(0.9);}
.c-hdr-t{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:2px; font-weight:700;}

.msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth; will-change: transform;}
.msgs::-webkit-scrollbar{width:0px}
.wlc{text-align:center;padding:30px 20px;color:var(--bl);font-size:13px;line-height:2; animation: popInMessage .6s var(--ease-spring);}
.wlc span{font-size:36px;display:block;margin-bottom:12px; animation: sway 4s infinite;}

@keyframes popInMessage {
  0% { opacity: 0; transform: translateY(16px) scale(0.95); transform-origin: bottom center; }
  100% { opacity: 1; transform: translateY(0) scale(1); transform-origin: bottom center; }
}

@keyframes highlightPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,160,23,0); }
  50% { transform: scale(1.03); box-shadow: 0 0 0 8px rgba(212,160,23,0.3); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,160,23,0); }
}
.highlight-anim .bbl { animation: highlightPulse 1s var(--ease-spring); border-color:var(--gold)!important; }

.mw{position:relative;display:flex;flex-direction:column;max-width:75%;animation:popInMessage .4s cubic-bezier(0.25, 0.8, 0.25, 1); will-change: transform, opacity;}
.mw.self{align-self:flex-end;align-items:flex-end;transform-origin:bottom right;}
.mw.other{align-self:flex-start;align-items:flex-start;transform-origin:bottom left;}
.mw-nm{font-size:11px;color:var(--bl);margin-bottom:4px;padding:0 6px; font-weight:500;}

.mw-row{display:flex;align-items:flex-end;gap:8px;max-width:100%;position:relative;}
.mw.self .mw-row{flex-direction:row-reverse}
.mav{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--gold-p);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(212,160,23,.15)}
.mav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.bbl{padding:12px 16px;border-radius:24px;font-size:15px;line-height:1.6;color:var(--brown);word-break:break-word;position:relative;display:flex;flex-direction:column;min-width:0; transition:all 0.2s; overflow:hidden;}
.mw.self .bbl{background:var(--bbl-self);border:1px solid rgba(212,160,23,.25);border-bottom-right-radius:6px; box-shadow: 0 2px 10px rgba(212,160,23,.08);}
.mw.other .bbl{background:var(--bbl-other);border:1px solid rgba(61,44,26,.08);border-bottom-left-radius:6px;box-shadow:0 2px 10px var(--sh)}
.bbl.recalled{background:transparent!important;border:1px dashed rgba(200,168,130,.5)!important;color:var(--bl)!important;font-style:italic;box-shadow:none!important;}

.bbl-media{max-width:100%;max-height:250px;border-radius:16px;display:block;object-fit:cover;background:#000;border:1px solid rgba(212,160,23,.1);}
.bbl-img{cursor:zoom-in;}
.bbl-img:active{transform:scale(0.96);}
.mw-t{font-size:10px;color:var(--bl);margin-top:4px;padding:0 6px; letter-spacing:1px;}

.file-box{display:flex;align-items:center;gap:12px;background:var(--bg-input);padding:10px 14px;border-radius:18px;border:1px solid rgba(212,160,23,.2);text-decoration:none;color:var(--brown);width:100%;max-width:260px;margin-top:4px;}
.file-box:hover{border-color:var(--gold);background:var(--gold-p); transform:translateY(-2px);}
.file-icon{font-size:28px;}
.file-info{flex:1;overflow:hidden;}
.file-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-sub{font-size:11px;color:var(--bl);margin-top:2px;}
.file-dl{width:32px;height:32px;border-radius:50%;background:var(--cream);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid rgba(212,160,23,.2);}
.file-box:hover .file-dl{background:var(--gold);color:#fff;border-color:var(--gold);}

.quote-box{background:var(--bg-input);border-left:4px solid var(--gold);padding:6px 10px;border-radius:10px;font-size:12px;color:var(--bm);margin-bottom:8px;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0; pointer-events:auto;}
.quote-box:hover{background:var(--gold-p); transform:translateX(2px);}
.quote-box:active{transform:scale(0.97);}

.msg-opts-btn {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--bl); font-size: 16px; font-weight: 700; cursor: pointer;
  opacity: 0.7; user-select: none; background: var(--bg-input); margin-bottom: 6px; flex-shrink:0;
}
.msg-opts-btn:hover, .msg-opts-btn:active { opacity: 1; background: var(--gold-p); color: var(--gold); transform:scale(1.1); }

.hvr-actions{
  position: absolute; top: 50%; display: flex; align-items: center; gap: 8px;
  opacity: 0; pointer-events: none; transition: all .3s var(--ease-spring); z-index: 50;
}
.mw.self .hvr-actions { right: 100%; transform: translateY(-50%) translateX(10px) scale(0.9); }
.mw.other .hvr-actions { left: 100%; transform: translateY(-50%) translateX(-10px) scale(0.9); }
.mw.show-menu .hvr-actions { opacity:1; pointer-events:auto; transform: translateY(-50%) translateX(0) scale(1); }
.mw.self.show-menu .hvr-actions { transform: translateY(-50%) translateX(-10px) scale(1); }
.mw.other.show-menu .hvr-actions { transform: translateY(-50%) translateX(10px) scale(1); }

.action-btn{
  background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(212,160,23,.3); border-radius: 16px; padding: 8px 16px;
  font-size: 13px; color: var(--bm); cursor: pointer; white-space: nowrap; font-family: inherit; font-weight: 700;
  box-shadow: 0 6px 16px rgba(61,44,26,.15);
}
.action-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 20px rgba(212,160,23,.3); }

.sysmsg{text-align:center;font-size:12px;color:var(--bl);padding:4px 16px;}
.sysmsg span{background:var(--bg-input); border:1px solid rgba(212,160,23,.1); padding:4px 14px; border-radius:20px;}

.inp-area{position:relative;flex-shrink:0;padding:12px 28px 24px;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-top:1px solid rgba(212,160,23,.15);display:flex;flex-direction:column;gap:10px;z-index:60;}
.reply-bar{display:none;background:var(--bg-card);border:1px solid rgba(212,160,23,.3);border-radius:16px;padding:8px 16px;align-items:center;justify-content:space-between;font-size:13px;
  opacity:0;visibility:hidden;transform:translateY(15px); transition:all .3s var(--ease-spring);}
.reply-bar.show { display:flex; opacity:1;visibility:visible;transform:translateY(0); }
.reply-bar-info{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--bm); font-weight:500;}
.reply-bar-close{background:var(--bg-input);border:none;width:24px;height:24px;border-radius:50%;font-size:14px;color:var(--bl);cursor:pointer;margin-left:12px; display:flex;align-items:center;justify-content:center;}

.gif-panel {

  border-top: 1px solid rgba(212,160,23,.15); padding: 14px 20px; display: flex; gap: 14px; overflow-x: auto;
  opacity: 0; visibility: hidden; transform: translateY(15px); transition: all .3s var(--ease-spring); z-index: 40;
}
.gif-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }
.gif-panel::-webkit-scrollbar { height: 0px; }
.g-item { height: 85px; border-radius: 16px; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 12px var(--sh); border:1px solid rgba(255,255,255,0.3);}
.g-item:active { transform: scale(0.9); }

.inp-row{display:flex;gap:10px;align-items:flex-end;background:var(--bg-input);border:1.5px solid rgba(212,160,23,.3);border-radius:30px;padding:8px 10px 8px 14px; transition:all .3s}
.inp-row:focus-within{background:var(--bg-card); border-color:var(--gold); box-shadow:0 8px 24px rgba(212,160,23,.15); transform:translateY(-2px);}

.att-btn{width:38px;height:38px;border:none;background:var(--bg-input);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;color:var(--gold);font-weight:700;}
.att-btn:hover{background:var(--gold-p); transform:scale(1.05);}
.att-btn svg{width:20px;height:20px;stroke:var(--bm);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

#fi2{display:none}
.msg-ta{flex:1;border:none;outline:none;font-family:inherit;font-size:16px;color:var(--brown);background:transparent;resize:none;max-height:120px;line-height:1.5;padding:6px 0; border-radius: 16px;}
.msg-ta::placeholder{color:var(--bl)}
.snd-btn{width:42px;height:42px;flex-shrink:0;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-l));cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(212,160,23,.3);}
.snd-btn:hover{box-shadow:0 6px 18px rgba(212,160,23,.4); transform:scale(1.08) rotate(-10deg);}
.snd-btn svg{width:18px;height:18px;fill:#fff; transform:translateX(1px);}

.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;pointer-events:none;transition:all .3s var(--ease-smooth);
}
.modal-overlay.show { opacity:1;visibility:visible;pointer-events:auto; }

.set-card{width:90%;max-width:400px; padding:32px 28px; transform:scale(0.95) translateY(20px); transition:transform .4s var(--ease-spring);}
.modal-overlay.show .set-card { transform:scale(1) translateY(0); }
.set-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.set-t{font-family:'Noto Serif TC',serif;font-size:22px; font-weight:700;}
.set-close{background:var(--bg-input);border:none;width:32px;height:32px;border-radius:50%;font-size:20px;color:var(--bl);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.set-close:hover{background:var(--gold-p); color:var(--gold); transform:scale(1.1) rotate(90deg);}
.set-item{margin-bottom:18px}
.set-lbl{font-size:12px;font-weight:700;color:var(--bl);margin-bottom:8px;letter-spacing:1px}
.theme-options{display:flex;gap:12px}
.t-opt{flex:1;padding:12px;border-radius:16px;border:1px solid rgba(212,160,23,.3);background:var(--bg-input);color:var(--brown);cursor:pointer;font-family:inherit;font-size:14px;text-align:center; font-weight:500;}
.t-opt:hover{border-color:var(--gold); transform:translateY(-2px);}
.t-opt.active{background:var(--gold);border-color:var(--gold);color:#fff; box-shadow:0 6px 16px rgba(212,160,23,.3);}

#crop-overlay { z-index:300; background:rgba(0,0,0,.85); }
.crop-box-wrap{position:relative;width:300px;height:300px;overflow:hidden;background:#111;border-radius:24px;touch-action:none; transform:scale(0.85); transition:transform .4s var(--ease-spring); box-shadow:0 20px 50px rgba(0,0,0,.5);}
#crop-overlay.show .crop-box-wrap { transform:scale(1); }
#crop-img{position:absolute;top:0;left:0;transform-origin:0 0;cursor:move;user-select:none;touch-action:none;}
.crop-mask{position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 999px rgba(0,0,0,.65);pointer-events:none;border:3px solid var(--gold)}
.crop-tips{color:#fff;font-size:13px;margin:20px 0 24px;opacity:.8;letter-spacing:2px; transform:translateY(15px); transition:transform .4s var(--ease-spring);}
#crop-overlay.show .crop-tips { transform:translateY(0); }
.crop-btns{display:flex;gap:16px;width:100%;max-width:300px;}

#lb{z-index:999; background:rgba(0,0,0,.85); cursor:zoom-out;}
#lb img{max-width:92vw;max-height:92vh;border-radius:20px;transform:scale(0.85);opacity:0;transition:all .4s var(--ease-spring);box-shadow:0 20px 60px rgba(0,0,0,.6);}
#lb.show img{transform:scale(1);opacity:1;}

@media(max-height: 800px), (max-width: 900px) {
  #s-home { padding: 15px; gap: 15px; }
  .big-title { font-size: 44px; }
  .logo-wrap { transform: scale(0.9); }
  .main-hero { padding: 15px 20px 5px; }
  .main-hero-t { font-size: 20px; margin-top: 8px; }
  .usr-list-wrap, .feed-list { gap: 14px; padding-bottom: 10px; }
  .c-hdr { padding: 12px 18px; }
  .inp-area { padding: 10px 20px 18px; }
  .msgs { padding: 16px 20px; }
}

@media(max-width: 768px) {
  .mw { max-width: 88%; }
  .inp-area { padding: 10px 16px 16px; }
  .msgs { padding: 16px 14px; }
  
  .hvr-actions { top: auto; bottom: calc(100% + 6px); }
  .hvr-actions::before { display: none; }
  .mw.self .hvr-actions { right: 0; transform: translateY(15px) scale(0.9); }
  .mw.other .hvr-actions { left: 0; transform: translateY(15px) scale(0.9); }
  .mw.show-menu .hvr-actions{ transform: translateY(0) scale(1); }
  
  .action-btn { padding: 8px 14px; font-size: 13px; }
  .gif-panel { padding: 12px; }
  .g-item { height: 70px; }
}
</style>

<!-- 主畫面大廳 (聊天列表) -->
<div class="scr off" id="s-main">

        <g transform="translate(45,34)">
          <line x1="0" y1="0" x2="0" y2="-22" stroke="#D4A017" stroke-width="1" opacity=".8"/><circle cx="0" cy="-22" r="3" fill="#E8B84B"/>

var REG=[

function renderStep(idx,back){
  stepIdx=idx; var ss=steps(),s=ss[idx]; var d=document.getElementById('dots'); d.innerHTML='';
  ss.forEach(function(_,i){var el=document.createElement('div');el.className='dot'+(i===idx?' on':'');d.appendChild(el);});

  else { var sv={'rn':rName,'rg':rGmail,'rp':rPwd,'rc':'','ln':lName,'lp':lPwd,'lc':''}[s.id]||''; body='<input class="fi" id="sf" type="'+s.it+'" placeholder="'+s.ph+'" value="'+esc(sv)+'" autocomplete="off">'; }
  body+='<div class="ferr" id="ferr"></div><div class="nr"><button class="nb" id="nb" onclick="nextStep()"><svg viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg></button></div>';
  document.getElementById('stp-body').innerHTML='<div class="card'+(back?' rev':'')+'"><div class="c-lbl">'+s.lbl+'</div><div class="c-ttl">'+s.ttl+'</div><div class="c-hint">'+s.hint+'</div>'+body+'</div>';
  if(s.type==='avatar'){
    if(rAv){var i=document.getElementById('av-img');i.src=rAv;i.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none';}
    document.getElementById('av-file').addEventListener('change',function(e){ var f=e.target.files[0]; this.value=''; if(!f)return; var r=new FileReader();r.onload=function(ev){ initCrop(ev.target.result, function(c){ rAv=c; var el=document.getElementById('av-img');el.src=rAv;el.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none'; }); };r.readAsDataURL(f); });
  } else { setTimeout(function(){var f=document.getElementById('sf');if(f){f.focus();f.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();nextStep();}});}},80); }
}

function setErr(m){var e=document.getElementById('ferr');if(e)e.textContent=m;}
function goBack(){if(stepIdx===0){show('s-home');return;}renderStep(stepIdx-1,true);}
function mkId(n,p){var s=n+'|'+p,h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h)^s.charCodeAt(i);h=h>>>0;}return'id_'+h.toString(36);}

function nextStep(){
  var ss=steps(),s=ss[stepIdx];setErr('');
  if(s.type==='avatar'){stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();return;}
  var v=(document.getElementById('sf')||{}).value||'';v=v.trim();
  
  if(!v && s.id !== 'rg'){setErr('⚠️ 欄位不能空白');return;}
  
  if(s.id==='rn'){
    // 防止特殊符號破壞 Firebase 節點鍵值
    if(/[.#$\[\]]/.test(v)) { setErr('❌ 名字不能包含 . # $ [ ] 等特殊符號'); return; }
    rName=v; 
  }
  else if(s.id==='rg'){
    if(v && !v.endsWith('@gmail.com')){setErr('❌ 請填寫正確的 Gmail');return;}
    rGmail=v;
  } 
  else if(s.id==='rp')rPwd=v; 
  else if(s.id==='rc'){if(v!==CLASS_CODE){setErr('❌ 密碼錯誤');return;}}
  else if(s.id==='ln')lName=v; 
  else if(s.id==='lp')lPwd=v; 
  else if(s.id==='lc'){if(v!==CLASS_CODE){setErr('❌ 密碼錯誤');return;}}
  
  stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();
}

function doAuth(){
  var nb=document.getElementById('nb');if(nb){nb.disabled=true;nb.innerHTML='…';}
  if(flow==='register'){
    var id=mkId(rName,rPwd);
    db.ref('users/'+rName).once('value',function(snap){
      if(snap.val()){renderStep(1,true);setTimeout(function(){setErr('❌ 名字已被使用');},100);return;}
      db.ref('users/'+rName).set({identity:id,avatar:rAv,gmail:rGmail,bio:'',rawPwd:rPwd}); myPwdRaw=rPwd; enterApp(rName,id,rAv,true);
    });
  } else {
    var id2=mkId(lName,lPwd);
    db.ref('users/'+lName).once('value',function(snap){
      var d=snap.val();if(!d){setErr('❌ 帳號不存在');if(nb){nb.disabled=false;nb.innerHTML='→';}return;}
      if(d.identity!==id2){setErr('❌ 密碼錯誤');if(nb){nb.disabled=false;nb.innerHTML='→';}return;}
      if(d.avatar){rAv=d.avatar;} myBio=d.bio||''; myPwdRaw=d.rawPwd||lPwd; enterApp(lName,id2,d.avatar||'',false);
    });
  }
}

document.getElementById('post-file').addEventListener('change', function(e){

  var isVid = /^video\//i.test(file.type);

  if(!isImg && !isVid) { alert('動態牆只能上傳照片或影片喔！'); return; }
  if(isVid && file.size > 8 * 1024 * 1024) { alert('為了系統流暢，影片請勿超過 8MB！'); return; }
  
  var reader = new FileReader();
  reader.onload = function(ev){

      document.getElementById('post-img-preview').style.display = 'none';
      var vidPreview = document.getElementById('post-vid-preview');

      document.getElementById('post-img-preview').src = postMediaData;
      document.getElementById('post-img-preview').style.display = 'block';
    } else {
      var img=new Image(); img.onload = function() {
        var cv=document.createElement('canvas'); var MP=1080; var w=img.width, h=img.height;
        if(w>MP||h>MP){ if(w>h){h=Math.round(h*MP/w);w=MP;} else {w=Math.round(w*MP/h);h=MP;} }
        cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
        postMediaType = 'image'; postMediaData = cv.toDataURL('image/jpeg', 0.85);
        document.getElementById('post-vid-preview').style.display = 'none';
        document.getElementById('post-img-preview').src = postMediaData;

(function(){
  var overlay=document.getElementById('crop-overlay');
  function start(x,y,dist){ isDragging=true;startX=x-imgX;startY=y-imgY;startDist=dist; }
  function move(x,y,dist){
    if(!isDragging)return; imgX=x-startX;imgY=y-startY;
    if(dist>0 && startDist>0){ var sc=dist/startDist;imgScale=Math.max(0.3,Math.min(4,imgScale*sc));startDist=dist; } updateCropTransform();
  }
  overlay.addEventListener('mousedown',function(e){if(e.target.closest('.crop-btns'))return; e.preventDefault(); start(e.clientX,e.clientY,0);});
  window.addEventListener('mousemove',function(e){if(isDragging){e.preventDefault(); move(e.clientX,e.clientY,0);}}, {passive:false});
  window.addEventListener('mouseup',function(){isDragging=false;});
  overlay.addEventListener('touchstart',function(e){
    if(e.target.closest('.crop-btns')) return; e.preventDefault();
    if(e.touches.length===1){ start(e.touches[0].clientX,e.touches[0].clientY,0); }
    else if(e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); start((e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2,d); }
  }, {passive: false});
  overlay.addEventListener('touchmove',function(e){
    if(e.target.closest('.crop-btns')) return; e.preventDefault();
    if(!isDragging)return; if(e.touches.length===1){ move(e.touches[0].clientX,e.touches[0].clientY,0); }
    else if(e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); move((e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2,d); }
  }, {passive: false});
  overlay.addEventListener('touchcancel',function(){isDragging=false;});
  overlay.addEventListener('touchend',function(){isDragging=false;});
})();

function initCrop(src, callback){
  cropSourceSrc=src;cropTargetHandler=callback; var cimg=document.getElementById('crop-img'); cimg.src=src;imgX=0;imgY=0;imgScale=1;isDragging=false;
  cimg.style.transform='translate(0px, 0px) scale(1)';
  cimg.onload=function(){
    var wrap=300; if(cimg.naturalWidth>cimg.naturalHeight){imgScale=wrap/cimg.naturalHeight;imgX=-(cimg.naturalWidth*imgScale-wrap)/2;}else{imgScale=wrap/cimg.naturalWidth;imgY=-(cimg.naturalHeight*imgScale-wrap)/2;} updateCropTransform();
  };
  document.getElementById('crop-overlay').classList.add('show');
}
function updateCropTransform(){ document.getElementById('crop-img').style.transform='translate('+imgX+'px, '+imgY+'px) scale('+imgScale+')'; }

function closeCrop(){document.getElementById('crop-overlay').classList.remove('show');}
function saveCrop(){
  var cimg=document.getElementById('crop-img'); var cv=document.createElement('canvas');cv.width=100;cv.height=100;
  cv.getContext('2d').drawImage(cimg, (-imgX)/imgScale, (-imgY)/imgScale, 300/imgScale, 300/imgScale, 0, 0, 100, 100);
  var data=cv.toDataURL('image/jpeg',0.82); if(cropTargetHandler)cropTargetHandler(data); closeCrop();
}

    var d=snap.val(); if(!d)return; d.name==='__system__'?addSys(d.text):addBubble(d,k);

  var isVid = /^video\//i.test(file.type);
  
  if(file.size>2*1024*1024 && file.type === 'image/gif'){alert('動圖請勿超過 2MB！');return;}
  if(isVid && file.size>8*1024*1024){alert('為了系統流暢，影片請勿超過 8MB！');return;}
  if(file.size>900*1024 && !isImg && !isVid && file.type !== 'image/gif'){alert('檔案太大！');return;}
  
  var reader=new FileReader();
  reader.onload=function(ev){
    if(isVid) {
      var m={name:me,type:'video',fileData:ev.target.result,fileName:file.name,avatar:myAv,deviceId:myId}; 
      if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
      pushMsg(m); cancelReply();
    }
    else if(file.type === 'image/gif') {
      var m={name:me,type:'image',fileData:ev.target.result,fileName:file.name,avatar:myAv,deviceId:myId}; 
      if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
      pushMsg(m); cancelReply();
    } else if(isImg) {
      var img=new Image();img.onload=function(){
        var cv=document.createElement('canvas');var MP=960;var w=img.width,h=img.height; if(w>MP||h>MP){if(w>h){h=Math.round(h*MP/w);w=MP;}else{w=Math.round(w*MP/h);h=MP;}}
        cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h); var data=cv.toDataURL('image/jpeg',0.85);
        var m={name:me,type:'image',fileData:data,fileName:file.name,avatar:myAv,deviceId:myId}; if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
        pushMsg(m); cancelReply();
      };img.src=ev.target.result;
    } else {
      var m={name:me,type:'file',fileData:ev.target.result,fileName:file.name,avatar:myAv,deviceId:myId}; if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
      pushMsg(m); cancelReply();
    }
  };reader.readAsDataURL(file);
});

function jumpToMessage(key) {
  var target = document.querySelector('[data-key="'+key+'"]');
  if(target) { 
    target.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
    target.classList.add('highlight-anim');
    setTimeout(function(){ target.classList.remove('highlight-anim'); }, 1200); 
  }
}

function handleMenuAction(e, callback) { e.preventDefault(); e.stopPropagation(); var mw = e.target.closest('.mw'); if(mw) mw.classList.remove('show-menu'); callback(); }

function openLb(src){ document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('show'); }
function closeLb(){ document.getElementById('lb').classList.remove('show'); }

function addBubble(d,key){
  var self=(d.name===me)&&(!d.deviceId||d.deviceId===myId);
  var rcld=!!d.recalled,ts=d.timestamp||Date.now(),av=d.avatar||''; var date=fmtD(ts);
  if(date!==lastDate){lastDate=date;var sep=document.createElement('div');sep.className='sysmsg';sep.innerHTML='<span>── '+date+' ──</span>';document.getElementById('msgs').appendChild(sep);}
  
  var w=document.createElement('div');w.className='mw '+(self?'self':'other'); if(key)w.setAttribute('data-key',key);
  var avH=av&&av.startsWith('data:')?'<div class="mav"><img src="'+esc(av)+'" alt=""></div>':'<div class="mav">🌼</div>';
  var quoteHtml = ''; if(!rcld && d.replyId){ quoteHtml = '<div class="quote-box" onclick="jumpToMessage(\''+d.replyId+'\')">↳ 回覆 ' + esc(d.replyName) + '：' + esc(d.replySnippet) + '</div>'; }

  var bb='';
  if(rcld){
    bb='<div class="bbl recalled">🌬️ 此訊息已收回</div>';
  } else if(d.type==='video'){
    bb='<div class="bbl" style="padding:6px">'+quoteHtml+'<video controls src="'+esc(d.fileData)+'" class="bbl-media"></video></div>';
  } else if(d.type==='image'){
    bb='<div class="bbl" style="padding:6px">'+quoteHtml+'<img src="'+esc(d.fileData)+'" class="bbl-media bbl-img" onclick="openLb(this.src)" alt="圖片"></div>';
  } else if(d.type==='file'){
    var fn = esc(d.fileName || '檔案');
    bb='<div class="bbl" style="padding:6px">'+quoteHtml+'<a class="file-box" href="'+esc(d.fileData)+'" download="'+fn+'"><div class="file-icon">📄</div><div class="file-info"><div class="file-name">'+fn+'</div><div class="file-sub">點擊下載檔案</div></div><div class="file-dl">⬇</div></a></div>';
  } else {
    bb='<div class="bbl">'+quoteHtml+esc(d.text||'')+'</div>';
  }
  
  var snippetText = d.type==='text'? (d.text||'') : ((d.type==='image' || d.type==='video') ?'📷 媒體':'📎 檔案');
  if(snippetText.length>14) snippetText = snippetText.slice(0,14) + '...';

  var actionButtonsHtml = '';
  var explicitMenuBtn = '';
  if(!rcld && key){
    explicitMenuBtn = '<div class="msg-opts-btn" onclick="toggleMsgMenu(this)">⋮</div>';
    actionButtonsHtml = '<div class="hvr-actions">';
    actionButtonsHtml += '<button class="action-btn rpl-act">回覆</button>';
    if(self){ actionButtonsHtml += '<button class="action-btn rcl-act">收回</button>'; }
    actionButtonsHtml += '</div>';
  }

  var row=self?'<div class="mw-row">'+actionButtonsHtml+explicitMenuBtn+bb+'</div>':'<div class="mw-nm">'+esc(d.name)+'</div><div class="mw-row">'+avH+bb+explicitMenuBtn+actionButtonsHtml+'</div>';
  w.innerHTML=row+'<div class="mw-t">'+fmtT(ts)+'</div>';
  
  if(!rcld && key){
    var rBtn = w.querySelector('.rpl-act'); if(rBtn){ rBtn.addEventListener('click', function(e){ handleMenuAction(e, function(){ initReply(key, d.name, snippetText); }); }); rBtn.addEventListener('touchstart', function(e){ handleMenuAction(e, function(){ initReply(key, d.name, snippetText); }); }, {passive: false}); }
    var cBtn = w.querySelector('.rcl-act'); if(cBtn){ cBtn.addEventListener('click', function(e){ handleMenuAction(e, function(){ rclMsg(cBtn); }); }); cBtn.addEventListener('touchstart', function(e){ handleMenuAction(e, function(){ rclMsg(cBtn); }); }, {passive: false}); }
  }

  document.getElementById('msgs').appendChild(w);
  requestAnimationFrame(function(){
    var m=document.getElementById('msgs');
    m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
  });
  return w;
}

function addSys(t){var sep=document.createElement('div');sep.className='sysmsg';sep.innerHTML='<span>'+esc(t)+'</span>';document.getElementById('msgs').appendChild(sep);var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function fmtT(ts){var d=new Date(ts);return('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtD(ts){var d=new Date(ts);return(d.getMonth()+1)+' 月 '+d.getDate()+' 日';}

function resetAllChats() {
  if (me !== ADMIN_NAME) { alert('你沒有權限執行此操作！'); return; }
  var confirm1 = confirm('⚠️ 警告：你確定要清空「所有」的對話紀錄、貼文與白板嗎？\n\n這包含大群組、私訊、自訂群組與動態牆的所有內容。\n（大家的帳號和群組名單會保留）');
  if (!confirm1) return;
  var confirm2 = prompt('此動作無法復原！\n請在下方輸入「確認清空」四個字來執行：');
  if (confirm2 !== '確認清空') { alert('密語錯誤或已取消，資料安全無恙。'); return; }

  if (db) {
    db.ref('messages').remove();
    db.ref('private_messages').remove();
    db.ref('custom_group_messages').remove();
    db.ref('posts').remove(); 
    db.ref('whiteboard/strokes').remove(); 
    alert('✅ 報告管理員！所有內容已經順利清空！');
    location.reload();
  }
}

function deleteCustomGroup() {
  if (confirm('⚠️ 確定要解散這個群組嗎？\n\n一旦解散，群組會消失，裡面的對話紀錄也會一併被永久刪除！')) {
    if (db && currentGroupId) {
      db.ref('custom_group_messages/' + currentGroupId).remove();
      db.ref('groups/' + currentGroupId).remove();
      alert('✅ 群組已成功解散！');
      backToMain(); 
    }
  }
}

// 🚀 向量筆跡引擎重寫 🚀
function getWbPos(e) {
  var rect = wbCanvas.getBoundingClientRect();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  var x = (clientX - rect.left) * (WB_WIDTH / rect.width);
  var y = (clientY - rect.top) * (WB_HEIGHT / rect.height);
  return {x: x, y: y};
}

function startDrawWb(e) {
  if(e.touches && e.touches.length > 1) return; 
  e.preventDefault();
  isDrawingWb = true;
  var pos = getWbPos(e);
  
  if(wbMode === 'pen') {
    currentPath = [Math.round(pos.x)+','+Math.round(pos.y)];
    wbCtx.beginPath();
    wbCtx.moveTo(pos.x, pos.y);
    wbCtx.lineCap = 'round';
    wbCtx.lineJoin = 'round';
    wbCtx.lineWidth = wbSize;
    wbCtx.strokeStyle = wbColor;
    wbLastX = pos.x; wbLastY = pos.y;
  } else {
    eraseMyStrokes(pos.x, pos.y, 30);
  }
}

function drawWb(e) {
  if(!isDrawingWb) return;
  e.preventDefault();
  var pos = getWbPos(e);
  
  if(wbMode === 'pen') {
    currentPath.push(Math.round(pos.x)+','+Math.round(pos.y));
    wbCtx.lineTo(pos.x, pos.y);
    wbCtx.stroke();
  } else {
    eraseMyStrokes(pos.x, pos.y, 30);
  }
}

function endDrawWb(e) { 
  if(!isDrawingWb) return;
  isDrawingWb = false; 
  if(wbMode === 'pen' && currentPath.length > 0) {
     if(db) {
       db.ref('whiteboard/strokes').push({
          a: me, 
          c: wbColor,
          s: wbSize,
          p: currentPath.join('|')
       });
     }
     currentPath = [];
  }
}

wbCanvas.addEventListener('mousedown', startDrawWb);
wbCanvas.addEventListener('mousemove', drawWb);
wbCanvas.addEventListener('mouseup', endDrawWb);
wbCanvas.addEventListener('mouseout', endDrawWb);

wbCanvas.addEventListener('touchstart', startDrawWb, {passive: false});
wbCanvas.addEventListener('touchmove', drawWb, {passive: false});
wbCanvas.addEventListener('touchend', endDrawWb);
wbCanvas.addEventListener('touchcancel', endDrawWb);

function renderWhiteboard() {
  wbCtx.clearRect(0, 0, WB_WIDTH, WB_HEIGHT);
  for(var key in allStrokes) {
    var s = allStrokes[key];
    var pts = s.p.split('|');
    if(!pts || pts.length === 0 || !pts[0]) continue;
    
    wbCtx.beginPath();
    var start = pts[0].split(',');
    wbCtx.moveTo(parseFloat(start[0]), parseFloat(start[1]));
    for(var i=1; i<pts.length; i++) {
      var pt = pts[i].split(',');
      wbCtx.lineTo(parseFloat(pt[0]), parseFloat(pt[1]));
    }
    if(pts.length === 1) {
      wbCtx.lineTo(parseFloat(start[0]) + 0.1, parseFloat(start[1]));
    }
    wbCtx.lineCap = 'round';
    wbCtx.lineJoin = 'round';
    wbCtx.lineWidth = s.s || 3;
    wbCtx.strokeStyle = s.c || '#000';
    wbCtx.stroke();
  }
  
  if(isDrawingWb && wbMode === 'pen' && currentPath.length > 0) {
    wbCtx.beginPath();
    var start = currentPath[0].split(',');
    wbCtx.moveTo(parseFloat(start[0]), parseFloat(start[1]));
    for(var i=1; i<currentPath.length; i++) {
      var pt = currentPath[i].split(',');
      wbCtx.lineTo(parseFloat(pt[0]), parseFloat(pt[1]));
    }
    wbCtx.lineCap = 'round';
    wbCtx.lineJoin = 'round';
    wbCtx.lineWidth = wbSize;
    wbCtx.strokeStyle = wbColor;
    wbCtx.stroke();
  }
}

function eraseMyStrokes(ex, ey, radius) {
  var radiusSq = radius * radius;
  for(var key in allStrokes) {
    var s = allStrokes[key];
    if(s.a === me) { 
      var pts = s.p.split('|');
      var hit = false;
      for(var i=0; i<pts.length; i++) {
        if(!pts[i]) continue;
        var pt = pts[i].split(',');
        var dx = parseFloat(pt[0]) - ex;
        var dy = parseFloat(pt[1]) - ey;
        if(dx*dx + dy*dy <= radiusSq) {
          hit = true; break;
        }
      }
      if(hit && db) {
        db.ref('whiteboard/strokes/' + key).remove();
        delete allStrokes[key]; 
        renderWhiteboard();
      }
    }
  }
}

function initWhiteboardSync() {
  if(!db) return;
  if(wbRef) wbRef.off();
  wbRef = db.ref('whiteboard/strokes');
  
  wbRef.on('value', function(snap) {
    allStrokes = snap.val() || {};
    renderWhiteboard();
  });
}

function clearBoard() {
  if (me !== ADMIN_NAME) {
    alert('只有管理員可以清空全班畫布喔！');
    return;
  }
  if(confirm('確定要清空全班共用的白板嗎？')) {
    if(db) db.ref('whiteboard/strokes').remove();
  }
}

function updateWbSize(val) {
  wbSize = parseInt(val);
  if(wbMode === 'pen') { lastPenSize = wbSize; }
}

function setDrawMode(mode) {
  wbMode = mode;
  var pBtn = document.getElementById('wb-pen-btn');
  var eBtn = document.getElementById('wb-eraser-btn');
  var slider = document.getElementById('wb-size-slider');
  
  if(mode === 'pen') {
    pBtn.style.background = 'var(--gold)'; pBtn.style.color = '#fff'; pBtn.style.borderColor = 'var(--gold)';
    eBtn.style.background = 'transparent'; eBtn.style.color = 'var(--bm)'; eBtn.style.borderColor = 'var(--gold-p)';
    wbSize = lastPenSize;
    slider.value = wbSize;
    wbCanvas.style.cursor = 'crosshair';
  } else {
    lastPenSize = wbSize; 
    eBtn.style.background = 'var(--gold)'; eBtn.style.color = '#fff'; eBtn.style.borderColor = 'var(--gold)';
    pBtn.style.background = 'transparent'; pBtn.style.color = 'var(--bm)'; pBtn.style.borderColor = 'var(--gold-p)';
    wbSize = 30; 
    slider.value = wbSize;
    wbCanvas.style.cursor = 'cell';
  }
}

function setWbColor(color, btnIndex) {
  wbColor = color;
  setDrawMode('pen'); 
  for(var i=1; i<=5; i++){ document.getElementById('cbtn-'+i).classList.remove('active'); }
  document.getElementById('cbtn-'+btnIndex).classList.add('active');
}
</script>
