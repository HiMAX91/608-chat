<style>
/* ... [保持之前的 CSS 設定以維持絲滑動畫] ... */
/* 🚀 擴充後的 GIF 面板樣式 */
.gif-panel {
  position: absolute; bottom: 100%; left: 0; right: 0; background: var(--bg-hdr); backdrop-filter: blur(16px);
  border-top: 1px solid rgba(212,160,23,.15); padding: 15px; display: flex; gap: 10px; overflow-x: auto;
  opacity: 0; visibility: hidden; transform: translateY(10px); transition: all .35s var(--ease-spring); z-index: 40;
}
.gif-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }
.gif-panel::-webkit-scrollbar { height: 6px; }
.gif-panel::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
.g-item { height: 90px; border-radius: 12px; cursor: pointer; flex-shrink: 0; transition: transform .2s; border: 1px solid rgba(212,160,23,.2); }
.g-item:hover { transform: scale(1.05); }
.g-item:active { transform: scale(0.9); }
</style>
</head>
<body>
<!-- ... (中間結構保持不變) ... -->

<script>
// 🚀 海量 GIF 資料庫：透過 JavaScript 動態載入，不拖慢網頁讀取

    // 😂 爆笑與反應
    "https://media.giphy.com/media/26AHONQ79FdWZhAI0/giphy.gif", "https://media.giphy.com/media/xT0xeJpnrWC4XWblWQ/giphy.gif", "https://media.giphy.com/media/3o7btLwOaOENz8c1qw/giphy.gif", "https://media.giphy.com/media/11ISwbgCxEzMyY/giphy.gif", "https://media.giphy.com/media/tHIRLHtNwxpjIFqPdV/giphy.gif", "https://media.giphy.com/media/PUBexcJiRu0py/giphy.gif", "https://media.giphy.com/media/l2JhtKtDWYNKdRpoA/giphy.gif", "https://media.giphy.com/media/10tIjpzIu8fe0/giphy.gif",
    // 🎨 動漫/迷因/ㄎㄧㄤ圖

    // 🏃‍♂️ 動作系列

  ];
  
  var gp = document.getElementById('gif-panel');
  gifUrls.forEach(function(u){
    var img = document.createElement('img'); img.src = u; img.className = 'g-item';
    img.onclick = function() {
      var m={name:me,type:'image',fileData:u,fileName:'gif',avatar:myAv,deviceId:myId}; 
      if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
      pushMsg(m); cancelReply(); toggleGif(false);
    };
    gp.appendChild(img);
  });
}
// ... (其餘邏輯與之前完全一致) ...
</script>
</body>
