<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蒲公英 · 我們的故事隨風飄揚</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FDFAF2;
      --gold: #D4A017;
      --gold-pale: #FBF5DC;
      --green: #5C8A3C;
      --green-light: #E8F0E0;
      --brown: #3D2C1A;
      --brown-mid: #7A5C3A;
      --brown-light: #C8A882;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); min-height: 100vh; overflow: hidden; }

    /* 飄浮種子 */
    .seeds-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .seed { position: absolute; bottom: -20px; opacity: 0; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%   { transform: translateX(0) rotate(0deg); opacity: 0; bottom: -20px; }
      10%  { opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translateX(var(--drift)) rotate(360deg); opacity: 0; bottom: 110vh; }
    }

    /* 登入畫面 */
    #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px; }
    .login-card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(212,160,23,0.25);
      border-radius: 32px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(61,44,26,0.1);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(30px) scale(0.95); } to { opacity:1; transform: translateY(0) scale(1); } }

    .dandelion-logo { margin-bottom: 20px; animation: sway 4s ease-in-out infinite; transform-origin: center bottom; }
    @keyframes sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

    .login-title { font-family: 'Noto Serif TC', serif; font-size: 42px; font-weight: 700; color: var(--brown); letter-spacing: 8px; margin-bottom: 6px; }
    .login-subtitle { font-size: 13px; color: var(--brown-light); letter-spacing: 2px; margin-bottom: 36px; }

    .input-group { margin-bottom: 14px; text-align: left; }
    .input-group label { display: block; font-size: 12px; color: var(--brown-mid); letter-spacing: 1px; margin-bottom: 6px; font-weight: 500; }
    .input-group input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid rgba(212,160,23,0.3);
      border-radius: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px; color: var(--brown);
      background: rgba(255,248,220,0.4);
      outline: none; transition: all 0.2s;
    }
    .input-group input:focus { border-color: var(--gold); background: rgba(255,248,220,0.8); box-shadow: 0 0 0 3px rgba(212,160,23,0.12); }
    .input-group input::placeholder { color: var(--brown-light); }

    .login-btn {
      width: 100%; padding: 14px; margin-top: 8px;
      background: linear-gradient(135deg, #D4A017, #E8B84B);
      border: none; border-radius: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px; font-weight: 500; color: white;
      letter-spacing: 3px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(212,160,23,0.35);
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,160,23,0.45); }
    .login-btn:active { transform: translateY(0); }
    .login-error { color: #C0392B; font-size: 13px; margin-top: 10px; display: none; }
    .login-footer { font-size: 11px; color: var(--brown-light); margin-top: 24px; line-height: 1.8; }

    /* 聊天畫面 */
    #chat-screen { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 10; }

    .chat-header {
      background: rgba(255,255,255,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212,160,23,0.15);
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .chat-header-icon { font-size: 24px; }
    .chat-header-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--brown); letter-spacing: 4px; }
    .user-chip { font-size: 13px; color: var(--brown-mid); background: var(--gold-pale); border: 1px solid rgba(212,160,23,0.25); padding: 5px 14px; border-radius: 20px; }

    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(212,160,23,0.3); border-radius: 2px; }

    .welcome-msg { text-align: center; padding: 20px; color: var(--brown-light); font-size: 13px; line-height: 2; }
    .welcome-msg .big { font-size: 28px; display: block; margin-bottom: 8px; }

    .message-wrapper { display: flex; flex-direction: column; max-width: 70%; animation: msgIn 0.25s ease; }
    @keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
    .message-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .msg-name { font-size: 11px; color: var(--brown-light); margin-bottom: 3px; padding: 0 4px; font-weight: 500; }
    .msg-bubble { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.6; color: var(--brown); word-break: break-word; }
    .message-wrapper.self .msg-bubble { background: #FFF8DC; border: 1px solid rgba(212,160,23,0.25); border-bottom-right-radius: 6px; }
    .message-wrapper.other .msg-bubble { background: #FFFFFF; border: 1px solid rgba(61,44,26,0.08); border-bottom-left-radius: 6px; box-shadow: 0 2px 8px rgba(61,44,26,0.08); }
    .msg-time { font-size: 10px; color: var(--brown-light); margin-top: 3px; padding: 0 4px; }

    .system-msg { text-align: center; font-size: 12px; color: var(--brown-light); padding: 4px 16px; }
    .system-msg span { background: rgba(245,230,163,0.4); padding: 3px 12px; border-radius: 20px; }

    .offline-bar { background: #FFF8DC; color: #7A5C3A; font-size: 12px; padding: 8px 16px; text-align: center; border-bottom: 1px solid rgba(212,160,23,0.2); flex-shrink: 0; }

    .input-area { flex-shrink: 0; padding: 12px 16px 20px; background: rgba(255,255,255,0.85); border-top: 1px solid rgba(212,160,23,0.12); }
    .input-row { display: flex; gap: 10px; align-items: flex-end; background: white; border: 1.5px solid rgba(212,160,23,0.3); border-radius: 24px; padding: 8px 8px 8px 18px; box-shadow: 0 2px 12px rgba(61,44,26,0.08); transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--gold); }
    .msg-input { flex: 1; border: none; outline: none; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; color: var(--brown); background: transparent; resize: none; max-height: 100px; line-height: 1.5; padding: 4px 0; }
    .msg-input::placeholder { color: var(--brown-light); }
    .send-btn { width: 42px; height: 42px; flex-shrink: 0; background: linear-gradient(135deg, #D4A017, #E8B84B); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 2px 8px rgba(212,160,23,0.35); }
    .send-btn:hover { transform: scale(1.08); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* 大頭貼 */
    .avatar-pick-wrap { display:flex; justify-content:center; margin-bottom:24px; }
    .avatar-circle {
      width:80px; height:80px; border-radius:50%;
      background:var(--gold-pale); border:2.5px dashed rgba(212,160,23,0.5);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;
    }
    .avatar-circle:hover { border-color:var(--gold); transform:scale(1.05); }
    .avatar-circle .camera-icon { font-size:28px; color:var(--brown-light); pointer-events:none; }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:none; }
    .avatar-circle .edit-hint {
      position:absolute; bottom:-20px; left:50%; transform:translateX(-50%);
      font-size:10px; color:var(--brown-light); white-space:nowrap;
    }

    /* 訊息大頭貼 */
    .msg-row { display:flex; align-items:flex-end; gap:8px; }
    .msg-av {
      width:34px; height:34px; border-radius:50%;
      background:var(--gold-pale); overflow:hidden; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:16px;
    }
    .msg-av img { width:100%; height:100%; object-fit:cover; }
    .message-wrapper.self .msg-row { flex-direction:row-reverse; }

    /* 手機收回按鈕永遠顯示（因為手機沒有hover） */
    @media (hover: none) {
      .message-wrapper.self .recall-btn { opacity: 0.55; }
    }

    /* 收回功能 */
    .bubble-row { display: flex; align-items: flex-end; gap: 6px; }
    .recall-btn {
      opacity: 0; transition: opacity 0.15s;
      background: white; border: 1px solid rgba(212,160,23,0.35);
      border-radius: 10px; padding: 3px 9px;
      font-size: 11px; color: var(--brown-mid);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .message-wrapper.self:hover .recall-btn,
    .message-wrapper.self.show-recall .recall-btn { opacity: 1; }
    .recall-btn:hover { background: #FFF3CD; color: var(--brown); }
    .msg-bubble.recalled {
      background: rgba(200,168,130,0.08) !important;
      border: 1px dashed rgba(200,168,130,0.4) !important;
      color: var(--brown-light) !important;
      font-style: italic; box-shadow: none !important;
    }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
      .login-title { font-size: 36px; }
      .message-wrapper { max-width: 85%; }
    }
  </style>
</head>

<script>
// ════════════════════════════════════════════
//  設定區 — 只有這裡需要改
// ════════════════════════════════════════════
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDtFTDggUZSZgTx55CxJL8zzJmvk-_knlI",
  authDomain:        "dandelion-chat-fd524.firebaseapp.com",
  databaseURL:       "https://dandelion-chat-fd524-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "dandelion-chat-fd524",
  storageBucket:     "dandelion-chat-fd524.firebasestorage.app",
  messagingSenderId: "825170651326",
  appId:             "1:825170651326:web:03e3e5b995028e27d7d6ef"
};
var CLASS_CODE = "608"; // ← 改成你要的密碼
// ════════════════════════════════════════════

// 全域狀態
var currentUser = null;
var myDeviceId = null;
var myAvatar = '';
var myGmail = '';
var db = null;
var shownKeys = {};
var lastDate = null;

// 用名字 + 個人密碼產生一致的身份 ID（不同裝置相同密碼 = 同一身份）
function makeIdentity(name, password) {
  var str = name + "|" + password;
  var h = 5381;
  for (var i = 0; i < str.length; i++) {
    h = ((h << 5) + h) ^ str.charCodeAt(i);
    h = h >>> 0;
  }
  return "id_" + h.toString(36);
}

// 初始化 Firebase
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch(e) {
  console.warn("Firebase 初始化失敗:", e);
}

// ── 登入 ──
function handleLogin() {
  var name = document.getElementById("name-input").value.trim();
  var code = document.getElementById("code-input").value.trim();
  var personal = document.getElementById("personal-input").value.trim();
  var gmail = document.getElementById("gmail-input").value.trim();
  var errEl = document.getElementById("login-error");

  if (!name) { document.getElementById("name-input").focus(); return; }
  if (!personal) { document.getElementById("personal-input").focus(); return; }
  if (gmail && (gmail.endsWith("@gapps.fju.edu.tw") || gmail.includes("edu.tw") || !gmail.includes("@gmail.com"))) {
    var errEl2 = document.getElementById("login-error");
    errEl2.textContent = "❌ 請使用 Gmail，不可以用學校帳號！";
    errEl2.style.display = "block";
    setTimeout(function(){ errEl2.style.display = "none"; }, 3500);
    return;
  }

  if (code !== CLASS_CODE) {
    errEl.textContent = "❌ 班級密碼不對，再試試看！";
    errEl.style.display = "block";
    setTimeout(function(){ errEl.style.display = "none"; }, 3000);
    return;
  }

  var identity = makeIdentity(name, personal);
  var btn = document.getElementById("login-btn");
  btn.textContent = "驗證中…";
  btn.disabled = true;

  function doLogin() {
    currentUser = name;
    myDeviceId = identity;
    myGmail = gmail || "";
    // myAvatar is already set by photo picker (or stays empty)
    document.getElementById("display-name").textContent = "👤 " + name;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";
    if (!db) {
      var bar = document.createElement("div");
      bar.className = "offline-bar";
      bar.textContent = "⚠️ 離線模式：訊息只有你自己看得到，上傳到 GitHub 後才能和同學一起聊";
      document.getElementById("chat-screen").insertBefore(bar, document.getElementById("messages"));
    }
    startListening();
    sendSystemMsg(name + " 來了 🌼");
  }

  // 如果沒有 Firebase，直接進入（離線模式）
  if (!db) { doLogin(); return; }

  // 檢查 Firebase 有沒有這個帳號
  db.ref("users/" + name).once("value", function(snap) {
    btn.textContent = "進入我們的空間 ✦";
    btn.disabled = false;
    var data = snap.val();
    if (!data) {
      // 新帳號，自動註冊
      db.ref("users/" + name).set({ identity: identity, avatar: myAvatar, gmail: myGmail });
      doLogin();
    } else if (data.identity === identity) {
      // 密碼正確，載入大頭貼
      if (data.avatar) {
        myAvatar = data.avatar;
        var img = document.getElementById("avatar-img");
        img.src = data.avatar; img.style.display = "block";
        document.querySelector("#avatar-circle .camera-icon").style.display = "none";
      }
      doLogin();
    } else {
      // 密碼錯誤
      errEl.textContent = "❌ 個人密碼錯誤！";
      errEl.style.display = "block";
      setTimeout(function(){ errEl.style.display = "none"; }, 3000);
    }
  });
}

// ── 監聽 Firebase 新訊息 ──
function startListening() {
  if (!db) return;
  var ref = db.ref("messages");
  ref.on("child_added", function(snapshot) {
    var key = snapshot.key;
    if (shownKeys[key]) return;
    shownKeys[key] = true;
    var data = snapshot.val();
    if (!data) return;
    if (data.name === "__system__") {
      addSystemMsg(data.text);
    } else {
      addBubble(data.name, data.recalled ? null : data.text, data.timestamp || Date.now(), key, data.deviceId, data.avatar || "🌼");
    }
  });
  // 監聽訊息被收回
  ref.on("child_changed", function(snapshot) {
    var key = snapshot.key;
    var data = snapshot.val();
    if (data && data.recalled) {
      var wrapper = document.querySelector('[data-key="' + key + '"]');
      if (wrapper) markRecalled(wrapper);
    }
  });
}

// ── 送出訊息 ──
function sendMessage() {
  var input = document.getElementById("msg-input");
  var text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = "";
  input.style.height = "auto";

  // 馬上顯示泡泡
  var wrapper = addBubble(currentUser, text, Date.now(), null);

  // 同步到 Firebase，取得 key 後更新 wrapper
  if (db) {
    var ref = db.ref("messages");
    var newRef = ref.push();
    shownKeys[newRef.key] = true;
    if (wrapper) wrapper.setAttribute("data-key", newRef.key);
    newRef.set({ name: currentUser, text: text, deviceId: myDeviceId, avatar: myAvatar, timestamp: firebase.database.ServerValue.TIMESTAMP });
  }
}

// ── 系統訊息 ──
function sendSystemMsg(text) {
  if (!db) return;
  var ref = db.ref("messages");
  var newRef = ref.push();
  shownKeys[newRef.key] = true;
  newRef.set({ name: "__system__", text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
}

// ── 顯示對話泡泡 ──
function addBubble(name, text, ts, key, deviceId, avatar) {
  var isSelf = (name === currentUser) && (!deviceId || deviceId === myDeviceId);
  var isRecalled = (text === null);
  var time = formatTime(ts);
  var date = formatDate(ts);
  var av = avatar || "🌼";

  if (date !== lastDate) {
    lastDate = date;
    var sep = document.createElement("div");
    sep.className = "system-msg";
    sep.innerHTML = "<span>── " + date + " ──</span>";
    document.getElementById("messages").appendChild(sep);
  }

  var wrapper = document.createElement("div");
  wrapper.className = "message-wrapper " + (isSelf ? "self" : "other");
  if (key) wrapper.setAttribute("data-key", key);

  var bubbleContent = isRecalled
    ? '<div class="msg-bubble recalled">🌬️ 此訊息已收回</div>'
    : '<div class="msg-bubble">' + esc(text) + '</div>';

  var nameTag = !isSelf ? '<div class="msg-name">' + esc(name) + '</div>' : '';
  var avatarTag = av && av.startsWith("data:")
    ? '<div class="msg-av"><img src="' + av + '" alt="頭像"></div>'
    : '<div class="msg-av">' + (av ? esc(av) : "🌼") + '</div>';

  if (isSelf && !isRecalled) {
    wrapper.innerHTML =
      '<div class="msg-row">' +
        '<div class="bubble-row"><button class="recall-btn" onclick="recallMessage(this)">收回</button>' + bubbleContent + '</div>' +
        avatarTag +
      '</div>' +
      '<div class="msg-time">' + time + '</div>';
  } else {
    wrapper.innerHTML =
      nameTag +
      '<div class="msg-row">' +
        avatarTag +
        bubbleContent +
      '</div>' +
      '<div class="msg-time">' + time + '</div>';
  }

  // 手機：點一下訊息泡泡切換收回按鈕顯示
  if (isSelf && !isRecalled) {
    wrapper.addEventListener("click", function(e) {
      if (e.target.classList.contains("recall-btn")) return;
      wrapper.classList.toggle("show-recall");
      setTimeout(function(){ wrapper.classList.remove("show-recall"); }, 3000);
    });
  }

  document.getElementById("messages").appendChild(wrapper);
  scrollDown();
  return wrapper;
}

// ── 標記已收回 ──
function markRecalled(wrapper) {
  var bubble = wrapper.querySelector(".msg-bubble");
  if (!bubble || bubble.classList.contains("recalled")) return;
  bubble.innerHTML = "🌬️ 此訊息已收回";
  bubble.classList.add("recalled");
  var btn = wrapper.querySelector(".recall-btn");
  if (btn) btn.parentNode.replaceChild(bubble.cloneNode(true), btn.parentNode.children[0]) || btn.remove();
  var row = wrapper.querySelector(".bubble-row");
  if (row) { row.outerHTML = bubble.outerHTML; }
  // 找到原本的 bubble-row，替換成單獨的 bubble
  var bRow = wrapper.querySelector(".bubble-row");
  if (bRow) bRow.outerHTML = '<div class="msg-bubble recalled">🌬️ 此訊息已收回</div>';
}

// ── 收回訊息 ──
function recallMessage(btn) {
  var wrapper = btn.closest(".message-wrapper");
  if (!wrapper) return;
  if (!confirm("確定要收回這則訊息嗎？")) return;
  markRecalled(wrapper);
  var key = wrapper.getAttribute("data-key");
  if (key && db) {
    db.ref("messages/" + key).update({ recalled: true });
  }
}

// ── 顯示系統訊息 ──
function addSystemMsg(text) {
  var el = document.createElement("div");
  el.className = "system-msg";
  el.innerHTML = "<span>" + esc(text) + "</span>";
  document.getElementById("messages").appendChild(el);
  scrollDown();
}

// ── 工具 ──
function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}
function scrollDown() {
  var el = document.getElementById("messages");
  requestAnimationFrame(function(){ el.scrollTop = el.scrollHeight; });
}
function formatTime(ts) {
  var d = new Date(ts);
  return ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
}
function formatDate(ts) {
  var d = new Date(ts);
  return (d.getMonth()+1) + " 月 " + d.getDate() + " 日";
}
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

// ── 事件綁定 ──
document.getElementById("login-btn").addEventListener("click", handleLogin);

document.getElementById("name-input").addEventListener("keydown", function(e){
  if (e.key === "Enter") document.getElementById("code-input").focus();
});
document.getElementById("code-input").addEventListener("keydown", function(e){
  if (e.key === "Enter") document.getElementById("personal-input").focus();
});
document.getElementById("personal-input").addEventListener("keydown", function(e){
  if (e.key === "Enter") document.getElementById("gmail-input").focus();
});
document.getElementById("gmail-input").addEventListener("keydown", function(e){
  if (e.key === "Enter") handleLogin();
});

document.getElementById("send-btn").addEventListener("click", sendMessage);

document.getElementById("msg-input").addEventListener("keydown", function(e){
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById("msg-input").addEventListener("input", function(){
  autoResize(this);
});

// ── 照片大頭貼選擇器 ──
document.getElementById("avatar-file").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var image = new Image();
    image.onload = function() {
      var canvas = document.createElement("canvas");
      canvas.width = 80; canvas.height = 80;
      var ctx = canvas.getContext("2d");
      // 裁成正方形再縮小
      var size = Math.min(image.width, image.height);
      var sx = (image.width - size) / 2;
      var sy = (image.height - size) / 2;
      ctx.drawImage(image, sx, sy, size, size, 0, 0, 80, 80);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.75);
      myAvatar = dataUrl;
      var img = document.getElementById("avatar-img");
      img.src = dataUrl; img.style.display = "block";
      document.querySelector("#avatar-circle .camera-icon").style.display = "none";
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── 飄浮種子動畫 ──
(function() {
  var container = document.getElementById("seeds");
  for (var i = 0; i < 18; i++) {
    var seed = document.createElement("div");
    seed.className = "seed";
    var size = Math.random() * 14 + 8;
    seed.style.left = (Math.random() * 100) + "%";
    seed.style.setProperty("--drift", ((Math.random()-0.5)*120) + "px");
    seed.style.animationDuration = (Math.random()*12+10) + "s";
    seed.style.animationDelay = (Math.random()*15) + "s";
    seed.innerHTML = '<svg width="'+size+'" height="'+(size*2)+'" viewBox="0 0 14 28" fill="none">'
      + '<line x1="7" y1="28" x2="7" y2="12" stroke="#D4A017" stroke-width="0.8" opacity="0.7"/>'
      + '<line x1="7" y1="12" x2="1" y2="4" stroke="#D4A017" stroke-width="0.5" opacity="0.5"/>'
      + '<line x1="7" y1="12" x2="13" y2="4" stroke="#D4A017" stroke-width="0.5" opacity="0.5"/>'
      + '<circle cx="7" cy="12" r="2.5" fill="#E8B84B" opacity="0.8"/></svg>';
    container.appendChild(seed);
  }
})();
