function steps(){return flow==='register'?REG:LOG;}

function startFlow(f){
  flow=f;rAv='';rName='';rGmail='';rPwd='';lName='';lPwd='';
  show('s-steps');renderStep(0,false);
}

function renderStep(idx,back){
  stepIdx=idx;
  var ss=steps(),s=ss[idx];
  // dots
  var d=document.getElementById('dots');d.innerHTML='';
  ss.forEach(function(_,i){var el=document.createElement('div');el.className='dot'+(i===idx?' on':'');d.appendChild(el);});
  document.getElementById('bk-btn').style.visibility=idx===0?'hidden':'visible';

  var body='';
  if(s.type==='avatar'){
    body='<div class="av-zone"><div class="av-btn" id="avb" onclick="document.getElementById(\'av-file\').click()"><img id="av-img" alt=""><span class="av-cam" id="av-cam">📷</span><span class="av-lbl" id="av-lbl">點我選照片</span></div><input type="file" id="av-file" accept="image/*"></div>';
  } else {
    var sv={'rn':rName,'rg':rGmail,'rp':rPwd,'rc':'','ln':lName,'lp':lPwd,'lc':''}[s.id]||'';
    body='<input class="fi" id="sf" type="'+s.it+'" placeholder="'+s.ph+'" value="'+esc(sv)+'" autocomplete="off">';
  }
  body+='<div class="ferr" id="ferr"></div><div class="nr"><button class="nb" id="nb" onclick="nextStep()"><svg viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg></button></div>';

  document.getElementById('stp-body').innerHTML='<div class="card'+(back?' rev':'')+'"><div class="c-lbl">'+s.lbl+'</div><div class="c-ttl">'+s.ttl+'</div><div class="c-hint">'+s.hint+'</div>'+body+'</div>';

  if(s.type==='avatar'){
    if(rAv){var i=document.getElementById('av-img');i.src=rAv;i.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none';}
    document.getElementById('av-file').addEventListener('change',function(e){
      var f=e.target.files[0];if(!f)return;
      var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){var cv=document.createElement('canvas');cv.width=80;cv.height=80;var ctx=cv.getContext('2d');var sz=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-sz)/2,(img.height-sz)/2,sz,sz,0,0,80,80);rAv=cv.toDataURL('image/jpeg',.78);var el=document.getElementById('av-img');el.src=rAv;el.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none';};img.src=ev.target.result;};r.readAsDataURL(f);
    });
  } else {
    setTimeout(function(){var f=document.getElementById('sf');if(f){f.focus();f.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();nextStep();}});}},80);
  }
}

function setErr(m){var e=document.getElementById('ferr');if(e)e.textContent=m;}

function goBack(){
  if(stepIdx===0){show('s-home');return;}
  renderStep(stepIdx-1,true);
}

function nextStep(){
  var ss=steps(),s=ss[stepIdx];setErr('');
  if(s.type==='avatar'){
    stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();return;
  }
  var v=(document.getElementById('sf')||{}).value||'';v=v.trim();
  if(!v){setErr('⚠️ 這個欄位不能空白');return;}
  if(s.id==='rn')rName=v;
  else if(s.id==='rg'){if(!v.endsWith('@gmail.com')){setErr('❌ 請使用個人 Gmail（結尾 @gmail.com）');return;}rGmail=v;}
  else if(s.id==='rp')rPwd=v;
  else if(s.id==='rc'){if(v!==CLASS_CODE){setErr('❌ 班級密碼不對！');return;}}
  else if(s.id==='ln')lName=v;
  else if(s.id==='lp')lPwd=v;
  else if(s.id==='lc'){if(v!==CLASS_CODE){setErr('❌ 班級密碼不對！');return;}}
  stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();
}

function mkId(n,p){var s=n+'|'+p,h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h)^s.charCodeAt(i);h=h>>>0;}return'id_'+h.toString(36);}

function doAuth(){
  var nb=document.getElementById('nb');if(nb){nb.disabled=true;nb.innerHTML='…';}
  if(!db){enterChat(flow==='register'?rName:lName,'',rAv);return;}
  if(flow==='register'){
    var id=mkId(rName,rPwd);
    db.ref('users/'+rName).once('value',function(snap){
      if(snap.val()){renderStep(1,true);setTimeout(function(){setErr('❌ 這個名字已有人用了，請換一個！');},100);return;}
      db.ref('users/'+rName).set({identity:id,avatar:rAv,gmail:rGmail});
      enterChat(rName,id,rAv);
    });
  } else {
    var id2=mkId(lName,lPwd);
    db.ref('users/'+lName).once('value',function(snap){
      var d=snap.val();
      if(!d){setErr('❌ 找不到這個帳號，請先去註冊！');if(nb){nb.disabled=false;nb.innerHTML='<svg viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>';}return;}
      if(d.identity!==id2){setErr('❌ 個人密碼錯誤！');if(nb){nb.disabled=false;nb.innerHTML='<svg viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>';}return;}
      if(d.avatar){rAv=d.avatar;}
      enterChat(lName,id2,d.avatar||'');
    });
  }
}

function enterChat(name,id,av){
  me=name;myId=id;myAv=av;
  document.getElementById('hname').textContent=name;
  if(av){var i=document.getElementById('hav-img');i.src=av;i.style.display='block';}
  show('s-chat');startListen();sysMsg(name+' 來了 🌼');
}

function startListen(){
  if(!db)return;
  db.ref('messages').on('child_added',function(snap){
    var k=snap.key;if(shownKeys[k])return;shownKeys[k]=true;
    var d=snap.val();if(!d)return;
    d.name==='__system__'?addSys(d.text):addBubble(d,k);
  });
  db.ref('messages').on('child_changed',function(snap){
    var d=snap.val();if(!d||!d.recalled)return;
    var w=document.querySelector('[data-key="'+snap.key+'"]');if(w)markRcl(w);
  });
}

function pushMsg(obj){
  if(!db)return;var nr=db.ref('messages').push();
  shownKeys[nr.key]=true;obj.timestamp=firebase.database.ServerValue.TIMESTAMP;nr.set(obj);
}
function sysMsg(t){if(!db)return;var nr=db.ref('messages').push();shownKeys[nr.key]=true;nr.set({name:'__system__',type:'system',text:t,timestamp:firebase.database.ServerValue.TIMESTAMP});}

document.getElementById('snd-btn').addEventListener('click',sendTxt);
document.getElementById('msg-ta').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTxt();}});
document.getElementById('msg-ta').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});

function sendTxt(){
  var ta=document.getElementById('msg-ta'),txt=ta.value.trim();
  if(!txt||!me)return;ta.value='';ta.style.height='auto';
  var m={name:me,type:'text',text:txt,avatar:myAv,deviceId:myId};
  addBubble(m,null);pushMsg(m);
}

document.getElementById('fi2').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file||!me)return;this.value='';
  var isImg=/^image\//i.test(file.type);
  if(file.size>900*1024&&!isImg){alert('檔案太大！最大支援 900KB');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    if(isImg){
      var img=new Image();img.onload=function(){
        var cv=document.createElement('canvas');var MP=960;
        var w=img.width,h=img.height;
        if(w>MP||h>MP){if(w>h){h=Math.round(h*MP/w);w=MP;}else{w=Math.round(w*MP/h);h=MP;}}
        cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
        var data=cv.toDataURL('image/jpeg',.78);
        if(data.length>1100*1024){alert('圖片太大，請選一張較小的照片');return;}
        var m={name:me,type:'image',fileData:data,fileName:file.name,avatar:myAv,deviceId:myId};
        addBubble(m,null);pushMsg(m);
      };img.src=ev.target.result;
    } else {
      var data=ev.target.result;
      if(data.length>1200*1024){alert('檔案太大！最大支援 900KB');return;}
      var m={name:me,type:'file',fileData:data,fileName:file.name,avatar:myAv,deviceId:myId};
      addBubble(m,null);pushMsg(m);
    }
  };reader.readAsDataURL(file);
});

function addBubble(d,key){
  var self=(d.name===me)&&(!d.deviceId||d.deviceId===myId);
  var rcld=!!d.recalled,ts=d.timestamp||Date.now(),av=d.avatar||'';
  var date=fmtD(ts);
  if(date!==lastDate){lastDate=date;var sep=document.createElement('div');sep.className='sysmsg';sep.innerHTML='<span>── '+date+' ──</span>';document.getElementById('msgs').appendChild(sep);}
  var w=document.createElement('div');w.className='mw '+(self?'self':'other');
  if(key)w.setAttribute('data-key',key);
  var avH=av&&av.startsWith('data:')?'<div class="mav"><img src="'+av+'" alt=""></div>':'<div class="mav">🌼</div>';
  var bb='';
  if(rcld)bb='<div class="bbl recalled">🌬️ 此訊息已收回</div>';
  else if(d.type==='image')bb='<div class="bbl" style="padding:6px"><img src="'+d.fileData+'" onclick="openLb(this.src)" alt="圖片"></div>';
  else if(d.type==='file')bb='<div class="bbl"><a class="flink" href="'+d.fileData+'" download="'+esc(d.fileName||'檔案')+'">📎 '+esc(d.fileName||'檔案')+'</a></div>';
  else bb='<div class="bbl">'+esc(d.text||'')+'</div>';
  var row='';
  if(self&&!rcld){row='<div class="mw-row"><div class="rcl-wrap"><button class="rcl-btn" onclick="rclMsg(this)">收回</button>'+bb+'</div>'+avH+'</div>';}
  else if(self){row='<div class="mw-row">'+bb+avH+'</div>';}
  else{row='<div class="mw-nm">'+esc(d.name)+'</div><div class="mw-row">'+avH+bb+'</div>';}
  w.innerHTML=row+'<div class="mw-t">'+fmtT(ts)+'</div>';
  if(self&&!rcld){w.addEventListener('click',function(e){if(e.target.classList.contains('rcl-btn'))return;w.classList.toggle('sr');setTimeout(function(){w.classList.remove('sr');},3000);});}
  document.getElementById('msgs').appendChild(w);
  requestAnimationFrame(function(){var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;});
  return w;
}

function addSys(t){var e=document.createElement('div');e.className='sysmsg';e.innerHTML='<span>'+esc(t)+'</span>';document.getElementById('msgs').appendChild(e);var m=document.getElementById('msgs');requestAnimationFrame(function(){m.scrollTop=m.scrollHeight;});}

function markRcl(w){var rw=w.querySelector('.rcl-wrap');if(rw)rw.innerHTML='<div class="bbl recalled">🌬️ 此訊息已收回</div>';else{var b=w.querySelector('.bbl');if(b){b.innerHTML='🌬️ 此訊息已收回';b.className='bbl recalled';}}}

function rclMsg(btn){var w=btn.closest('.mw');if(!w)return;if(!confirm('確定要收回嗎？'))return;markRcl(w);var k=w.getAttribute('data-key');if(k&&db)db.ref('messages/'+k).update({recalled:true});}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}
function fmtT(ts){var d=new Date(ts);return('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtD(ts){var d=new Date(ts);return(d.getMonth()+1)+' 月 '+d.getDate()+' 日';}
function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lb').style.display='flex';}

// ══ 加入主畫面引導 ══
(function(){
  // 已是 standalone App 就不顯示
  if(window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches) return;
  // 已關閉過就不顯示
  if(localStorage.getItem('ib_dismissed')) return;

  var ua=navigator.userAgent;
  var isIOS=/iphone|ipad|ipod/i.test(ua);
  var isAndroid=/android/i.test(ua);
  var isMobile=isIOS||isAndroid;
  if(!isMobile) return; // 電腦/平板不顯示

  var banner=document.getElementById('install-banner');
  var desc=document.getElementById('ib-desc');

  if(isIOS){
    desc.innerHTML='用 <b>Safari</b> 開啟網站，點下方'
      +'<svg class="ib-share" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10L12 6m0 0l4 4m-4-4v12"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>'
      +'<b>分享</b>，再選 <b>「加入主畫面」</b>，就能像 App 一樣使用！'
      +'<span class="ib-arrow">👇</span>';
  } else if(isAndroid){
    desc.innerHTML='用 <b>Chrome</b> 開啟網站，點右上角 <b>⋮</b>，選 <b>「新增至主畫面」</b>，就能像 App 一樣使用！'
      +'<span class="ib-arrow">👆</span>';
  }

  // 延遲 2 秒再出現
  setTimeout(function(){ banner.style.display='block'; }, 2000);
})();

function dismissBanner(){
  document.getElementById('install-banner').style.display='none';
  localStorage.setItem('ib_dismissed','1');
}

// ── 更換大頭貼 ──
document.getElementById('chg-av').addEventListener('change', function(e) {
  var file = e.target.files[0]; if(!file) return;
  this.value = '';
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var cv = document.createElement('canvas'); cv.width=80; cv.height=80;
      var sz = Math.min(img.width, img.height);
      cv.getContext('2d').drawImage(img,(img.width-sz)/2,(img.height-sz)/2,sz,sz,0,0,80,80);
      var data = cv.toDataURL('image/jpeg', .78);
      // 更新畫面
      myAv = data;
      var hi = document.getElementById('hav-img');
      hi.src = data; hi.style.display = 'block';
      // 更新 Firebase
      if(db && me) db.ref('users/'+me).update({avatar: data});
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
</script>
