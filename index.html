<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>608 Memories | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: sans-serif; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bubble-me { background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 20px 20px 5px 20px; }
        .bubble-other { background: rgba(255, 255, 255, 0.1); border-radius: 20px 20px 20px 5px; }
        /* 側欄小動畫 */
        #sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="flex justify-center items-center">

    <div class="glass w-full max-w-lg h-[90vh] md:rounded-[40px] flex flex-col relative overflow-hidden shadow-2xl">
        
        <div class="p-6 flex justify-between items-center border-b border-white/5">
            <button onclick="toggleSidebar()" class="text-white/50 hover:text-white">☰</button>
            <h1 id="roomTitle" class="font-bold text-lg">全班廣場</h1>
            <div class="w-8"></div>
        </div>

        <div id="sidebar" class="absolute inset-y-0 left-0 w-64 glass z-50 transform -translate-x-full p-6">
            <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest mb-4">聊天房間</h3>
            <button onclick="switchRoom('608_public', '全班廣場')" class="block w-full text-left py-2 hover:text-indigo-400"># 全班廣場</button>
            <button onclick="switchRoom('608_homework', '作業討論')" class="block w-full text-left py-2 hover:text-indigo-400"># 作業討論</button>
            <h3 class="text-xs font-bold text-white/30 uppercase tracking-widest mt-8 mb-4">私訊測試</h3>
            <button onclick="switchRoom('祥祐_秘密', '我的私訊')" class="block w-full text-left py-2 hover:text-indigo-400">👤 我的空間</button>
            <button onclick="toggleSidebar()" class="mt-10 text-xs text-white/20 underline">關閉選單</button>
        </div>

        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth"></div>

        <div class="p-6 bg-gradient-to-t from-black/20 to-transparent">
            <div class="bg-white/5 rounded-2xl p-2 flex items-center gap-2 border border-white/10">
                <input type="text" id="msgInput" placeholder="Aa" class="flex-1 bg-transparent border-none outline-none px-3 text-white">
                <button id="sendBtn" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold active:scale-95 transition">發送</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJSuqXYepa9yhr3kePaS64hrZn_3rnDHY",
            authDomain: "memories-608.firebaseapp.com",
            projectId: "memories-608",
            storageBucket: "memories-608.firebasestorage.app",
            messagingSenderId: "741842865476",
            appId: "1:741842865476:web:decefe44da036f978d5b11"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const col = collection(db, "chats");

        let currentRoom = "608_public";
        let unsubscribe = null;

        // 切換房間功能
        window.switchRoom = (id, title) => {
            currentRoom = id;
            document.getElementById('roomTitle').innerText = title;
            toggleSidebar();
            listenMessages();
        };

        window.toggleSidebar = () => {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
        };

        // 核心監聽邏輯：因為變模組化了，所以看起來程式碼變少
        function listenMessages() {
            if (unsubscribe) unsubscribe(); // 清除舊的監聽
            const q = query(col, where("roomId", "==", currentRoom), orderBy("time", "asc"));
            
            unsubscribe = onSnapshot(q, (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const isMe = d.sender === "祥祐";
                    box.innerHTML += `
                        <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                            <span class="text-[10px] text-white/20 mb-1 px-2">${d.sender}</span>
                            <div class="${isMe ? 'bubble-me' : 'bubble-other'} px-4 py-2 text-sm font-medium shadow-lg">
                                ${d.content}
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function send() {
            const el = document.getElementById('msgInput');
            if(!el.value.trim()) return;
            await addDoc(col, { content: el.value, sender: "祥祐", roomId: currentRoom, time: serverTimestamp() });
            el.value = "";
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('msgInput').onkeypress = (e) => e.key === 'Enter' && send();

        listenMessages();
    </script>
</body>
</html>
