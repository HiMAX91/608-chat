<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>蒲公英</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="蒲公英">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDFAF2;--gold:#D4A017;--gold-l:#E8B84B;--gold-p:#FBF5DC;
  --brown:#3D2C1A;--bm:#7A5C3A;--bl:#C8A882;--sh:rgba(61,44,26,.10);
  --bg-card:rgba(255,255,255,.9);--bg-input:rgba(255,248,220,.3);
  --bg-input-f:rgba(255,248,220,.7);--bg-hdr:rgba(255,255,255,.88);
  --bbl-other:#fff;--bbl-self:#FFF8DC;
  /* 🌟 加入 iOS 原生質感的全局動畫曲線 */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
}

[data-theme="dark"] {
  --cream:#1F160E;--gold:#E8B84B;--gold-l:#F5D382;--gold-p:#362719;
  --brown:#F5EFEB;--bm:#D1BAA3;--bl:#A38563;--sh:rgba(0,0,0,.4);
  --bg-card:rgba(43,31,20,.95);--bg-input:rgba(61,44,26,.5);
  --bg-input-f:rgba(77,56,34,.8);--bg-hdr:rgba(31,22,14,.92);
  --bbl-other:#2D1F14;--bbl-self:#4A3622;
}

html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--brown);transition:background .4s var(--ease-smooth), color .4s var(--ease-smooth)}

/* 種子 */
#seeds{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.seed{position:absolute;bottom:-20px;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{bottom:-20px;opacity:0;transform:translateX(0) rotate(0deg)}10%{opacity:.6}90%{opacity:.4}100%{bottom:110vh;opacity:0;transform:translateX(var(--dx)) rotate(400deg)}}

/* 🌟 畫面切換柔和漸變 */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:var(--cream);opacity:1;visibility:visible;pointer-events:auto;transition:opacity .35s var(--ease-smooth), transform .35s var(--ease-smooth), visibility .35s;}
.scr.off{opacity:0!important;visibility:hidden!important;pointer-events:none!important;transform:scale(0.97) translateY(10px)!important;}

/* 🌟 全局物理微回饋：所有互動元件點擊時 Q彈縮小 */
.pill, .action-btn, .c-btn, .nb, .bk-btn, .snd-btn, .att-btn, .usr-row, .my-chip, .file-box, .t-opt { transition:all .25s var(--ease-smooth); }
.pill:active, .action-btn:active, .c-btn:active, .nb:active, .bk-btn:active, .snd-btn:active, .att-btn:active, .usr-row:active, .my-chip:active, .file-box:active, .t-opt:active { transform: scale(0.95) !important; opacity: 0.85; transition: transform 0.1s, opacity 0.1s; }

/* ══ 首頁 ══ */
#s-home{gap:28px;padding:24px;z-index:20}
.logo-wrap{animation:sway 4s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.big-title{font-family:'Noto Serif TC',serif;font-size:52px;letter-spacing:10px}
.big-sub{font-size:13px;color:var(--bl);letter-spacing:3px}
.home-btns{display:flex;gap:14px;margin-top:4px;z-index:30;pointer-events:auto;}
.pill{padding:14px 42px;border-radius:50px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;border:none;letter-spacing:2px;user-select:none;-webkit-user-select:none;}
.pill.pri{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;box-shadow:0 4px 18px rgba(212,160,23,.4)}
.pill.pri:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(212,160,23,.5)}
.pill.sec{background:var(--bg-card);color:var(--bm);border:1.5px solid rgba(212,160,23,.4)}
.pill.sec:hover{background:var(--gold-p)}

/* ══ 步驟頁 ══ */
#s-steps{justify-content:flex-start;padding:0;z-index:30}
.stp-bar{width:100%;max-width:480px;display:flex;align-items:center;padding:20px 20px 0;flex-shrink:0}
.bk-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-card);border:1.5px solid rgba(212,160,23,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bm);}
.bk-btn:hover{background:var(--gold-p)}
.dots{display:flex;gap:6px;margin-left:auto}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(212,160,23,.25);transition:all .3s}
.dot.on{background:var(--gold);width:20px}
.stp-body{flex:1;width:100%;max-width:480px;padding:14px 22px 22px;overflow:hidden}
.card{background:var(--bg-card);border:1px solid rgba(212,160,23,.2);border-radius:28px;padding:36px 30px 28px;box-shadow:0 6px 36px var(--sh);animation:cIn .4s var(--ease-spring);width:100%}
.card.rev{animation:cInR .4s var(--ease-spring);}
@keyframes cIn {from{opacity:0;transform:translateX(40px) scale(0.98)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes cInR{from{opacity:0;transform:translateX(-40px) scale(0.98)}to{opacity:1;transform:translateX(0) scale(1)}}
.c-lbl{font-size:11px;font-weight:500;letter-spacing:2px;color:var(--bl);margin-bottom:8px}
.c-ttl{font-family:'Noto Serif TC',serif;font-size:22px;margin-bottom:6px}
.c-hint{font-size:12px;color:var(--bl);line-height:1.8;margin-bottom:22px}
.av-zone{display:flex;justify-content:center;margin:4px 0 18px}
.av-btn{width:96px;height:96px;border-radius:50%;background:var(--gold-p);border:2.5px dashed rgba(212,160,23,.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .2s;overflow:hidden}
.av-btn:hover{border-color:var(--gold);transform:scale(1.04)}
.av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.av-cam{font-size:28px}.av-lbl{font-size:11px;color:var(--bl)}
#av-file{display:none}

.fi{width:100%;padding:14px 18px;border:1.5px solid rgba(212,160,23,.3);border-radius:16px;font-family:inherit;font-size:16px;color:var(--brown);background:var(--bg-input);outline:none;transition:all .3s var(--ease-smooth)}
.fi:focus{border-color:var(--gold);background:var(--bg-input-f);box-shadow:0 0 0 4px rgba(212,160,23,.15)}
.fi::placeholder{color:var(--bl)}
.ferr{font-size:12px;color:#C0392B;margin-top:10px;min-height:16px}
.nr{display:flex;justify-content:flex-end;margin-top:22px}
.nb{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(212,160,23,.4);}
.nb:hover{transform:scale(1.1)}
.nb svg{width:22px;height:22px;fill:#fff}
.nb:disabled{opacity:.5;cursor:default}

/* ══ 主畫面 (大廳) ══ */
#s-main{flex-direction:column;justify-content:flex-start;padding:0;z-index:40}
.m-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,160,23,.15);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-hdr-t{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:2px;font-weight:700}
.my-chip{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;background:rgba(212,160,23,.05);padding:4px 10px;border-radius:30px;border:1px solid rgba(212,160,23,.15);z-index:90;position:relative;}
.my-chip > * { pointer-events: none !important; }
.hav{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;position:relative;border:1px solid rgba(212,160,23,.2)}
.hav img{width:100%;height:100%;object-fit:cover}
.hname-box{display:flex;flex-direction:column}
.hname{font-size:13px;color:var(--brown);font-weight:500;line-height:1.2}
.hbio-sub{font-size:10px;color:var(--bl);max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px 10px;flex-shrink:0;animation:popInMessage .5s var(--ease-spring);}
.main-hero-t{font-family:'Noto Serif TC',serif;font-size:22px;color:var(--brown);letter-spacing:6px;font-weight:700;margin-top:14px;}
.main-hero-s{font-size:11px;color:var(--bl);letter-spacing:3px;margin-top:4px;}

.usr-list-wrap{flex:1;width:100%;overflow-y:auto;padding:10px 20px 20px;display:flex;flex-direction:column;gap:12px;max-width:600px;align-self:center;}
.usr-list-wrap::-webkit-scrollbar{width:3px}
.usr-list-wrap::-webkit-scrollbar-thumb{background:rgba(212,160,23,.3);border-radius:2px}
.usr-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg-card);border-radius:18px;border:1px solid rgba(212,160,23,.15);cursor:pointer;box-shadow:0 2px 10px var(--sh);animation:popInMessage .4s var(--ease-spring) both;}
.usr-row:nth-child(1) { animation-delay: 0.05s; }
.usr-row:nth-child(2) { animation-delay: 0.1s; }
.usr-row:nth-child(3) { animation-delay: 0.15s; }
.usr-row:nth-child(n+4) { animation-delay: 0.2s; }

.usr-row:hover{background:var(--gold-p);border-color:var(--gold);transform:translateY(-2px);}
.usr-row.grp{background:linear-gradient(135deg,rgba(245,230,163,.3),rgba(212,160,23,.1)); border-color:var(--gold-l);}
.usr-info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.usr-name{font-size:16px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-sub{font-size:12px;color:var(--bl);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-arrow{color:var(--gold);font-weight:700;opacity:0.6;font-size:18px;}
.usr-div{font-size:11px;color:var(--bl);letter-spacing:2px;font-weight:500;margin:10px 0 2px;padding-left:10px;}

/* ══ 聊天室 ══ */
#s-chat{flex-direction:column;justify-content:flex-start;padding:0;overflow:hidden;align-items:stretch;z-index:50}
.c-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,160,23,.15);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.c-hdr-l{display:flex;align-items:center;gap:12px;padding-left:4px;}
.c-bk{font-size:24px;cursor:pointer;color:var(--gold);padding-right:6px;font-weight:700;transition:transform .2s;}
.c-bk:active{transform:translateX(-4px) scale(0.9);}
.c-hdr-t{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:2px;}

.msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(212,160,23,.3);border-radius:2px}
.wlc{text-align:center;padding:20px;color:var(--bl);font-size:13px;line-height:2}
.wlc span{font-size:30px;display:block;margin-bottom:8px}

@keyframes popInMessage {
  0% { opacity: 0; transform: translateY(12px) scale(0.9); transform-origin: bottom center; }
  100% { opacity: 1; transform: translateY(0) scale(1); transform-origin: bottom center; }
}
.mw{position:relative;display:flex;flex-direction:column;max-width:68%;animation:popInMessage .45s var(--ease-spring);}
.mw.self{align-self:flex-end;align-items:flex-end;transform-origin:bottom right;}
.mw.other{align-self:flex-start;align-items:flex-start;transform-origin:bottom left;}
.mw-nm{font-size:11px;color:var(--bl);margin-bottom:3px;padding:0 4px}

.mw-row{display:flex;align-items:flex-end;gap:7px;max-width:100%;position:relative;}
.mw.self .mw-row{flex-direction:row-reverse}
.mav{width:32px;height:32px;border-radius:50%;overflow:hidden;background:var(--gold-p);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(212,160,23,.15)}
.mav img{width:100%;height:100%;object-fit:cover}

.bbl{padding:10px 15px;border-radius:20px;font-size:15px;line-height:1.6;color:var(--brown);word-break:break-word;position:relative;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:all 0.3s var(--ease-smooth);}
.mw.self .bbl{background:var(--bbl-self);border:1px solid rgba(212,160,23,.25);border-bottom-right-radius:5px}
.mw.other .bbl{background:var(--bbl-other);border:1px solid rgba(61,44,26,.08);border-bottom-left-radius:5px;box-shadow:0 2px 8px var(--sh)}
.bbl.recalled{background:transparent!important;border:1px dashed rgba(200,168,130,.4)!important;color:var(--bl)!important;font-style:italic;box-shadow:none!important;display:block;}
.bbl img{max-width:100%;max-height:220px;border-radius:12px;display:block;cursor:zoom-in;transition:transform .2s;}
.bbl img:active{transform:scale(0.98);}
.flink{display:flex;align-items:center;gap:7px;color:var(--gold);text-decoration:none;font-size:13px;font-weight:500}
.mw-t{font-size:10px;color:var(--bl);margin-top:3px;padding:0 4px}

.quote-box{background:rgba(212,160,23,.08);border-left:3px solid var(--gold);padding:4px 8px;border-radius:6px;font-size:12px;color:var(--bm);margin-bottom:6px;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;transition:all .2s var(--ease-smooth);}
.quote-box:hover{background:rgba(212,160,23,.15)}
.quote-box:active{transform:scale(0.97);}

/* 🚀 旗艦級懸浮按鈕：電腦版自動排在氣泡側邊，隨手好點絕不卡！ */
.hvr-actions{
  position: absolute;
  top: 50%;
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s var(--ease-smooth), transform .2s var(--ease-smooth);
  z-index: 50;
}
.mw.self .hvr-actions { right: 100%; margin-right: 10px; transform: translateY(-50%) translateX(10px); }
.mw.other .hvr-actions { left: 100%; margin-left: 10px; transform: translateY(-50%) translateX(-10px); }
.mw:hover .hvr-actions, .mw.show-menu .hvr-actions{ opacity:1; pointer-events:auto; transform: translateY(-50%) translateX(0); }
.action-btn{background:var(--bg-card);border:1px solid rgba(212,160,23,.3);border-radius:10px;padding:5px 11px;font-size:12px;color:var(--bm);cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:0 2px 8px var(--sh);}
.action-btn:hover{background:var(--gold-p);border-color:var(--gold);}

.sysmsg{text-align:center;font-size:12px;color:var(--bl);padding:3px 16px;animation:popInMessage .4s ease;}
.sysmsg span{background:rgba(245,230,163,.25);padding:3px 12px;border-radius:20px}

/* 🌟 輸入區域呼吸光暈 */
.inp-area{flex-shrink:0;padding:12px 28px 20px;background:var(--bg-hdr);border-top:1px solid rgba(212,160,23,.12);display:flex;flex-direction:column;gap:8px}
.reply-bar{display:none;background:var(--bg-card);border:1px solid rgba(212,160,23,.2);border-radius:12px;padding:6px 14px;align-items:center;justify-content:space-between;font-size:13px;animation:popInMessage .3s var(--ease-spring)}
.reply-bar-info{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--bm)}
.reply-bar-close{background:none;border:none;font-size:16px;color:var(--bl);cursor:pointer;margin-left:10px}
.inp-row{display:flex;gap:8px;align-items:flex-end;background:var(--bg-card);border:1.5px solid rgba(212,160,23,.3);border-radius:26px;padding:8px 8px 8px 12px;box-shadow:0 2px 10px var(--sh);transition:all .3s var(--ease-smooth)}
.inp-row:focus-within{border-color:var(--gold); box-shadow:0 4px 16px rgba(212,160,23,.2);}
.att-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.att-btn:hover{background:var(--gold-p)}
.att-btn svg{width:20px;height:20px;stroke:var(--bl);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#fi2{display:none}
.msg-ta{flex:1;border:none;outline:none;font-family:inherit;font-size:15px;color:var(--brown);background:transparent;resize:none;max-height:100px;line-height:1.5;padding:5px 0}
.msg-ta::placeholder{color:var(--bl)}
.snd-btn{width:40px;height:40px;flex-shrink:0;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold),var(--gold-l));cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(212,160,23,.4);}
.snd-btn:hover{box-shadow:0 4px 14px rgba(212,160,23,.6);}
.snd-btn svg{width:17px;height:17px;fill:#fff}

/* 🌟 各類選單與燈箱滑順過場 */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(5px);
  opacity:0;visibility:hidden;transition:opacity .35s var(--ease-smooth), visibility .35s;
}
.modal-overlay.show { opacity:1;visibility:visible; }

/* 設置面板 */
.set-card{width:90%;max-width:380px;background:var(--bg-card);border:1px solid rgba(212,160,23,.25);border-radius:24px;padding:28px 24px;box-shadow:0 10px 40px var(--sh); transform:scale(0.9) translateY(10px); transition:transform .4s var(--ease-spring);}
.modal-overlay.show .set-card { transform:scale(1) translateY(0); }
.set-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.set-t{font-family:'Noto Serif TC',serif;font-size:20px}
.set-close{background:none;border:none;font-size:22px;color:var(--bl);cursor:pointer;transition:transform .2s;}
.set-close:active{transform:scale(0.8);}
.set-item{margin-bottom:16px}
.set-lbl{font-size:12px;font-weight:500;color:var(--bl);margin-bottom:6px;letter-spacing:1px}
.theme-options{display:flex;gap:10px}
.t-opt{flex:1;padding:10px;border-radius:12px;border:1.5px solid rgba(212,160,23,.3);background:transparent;color:var(--brown);cursor:pointer;font-family:inherit;font-size:13px;text-align:center}
.t-opt.active{background:var(--gold-p);border-color:var(--gold);font-weight:500}

/* 裁切器燈箱 */
#crop-overlay { z-index:300; background:rgba(0,0,0,.85); backdrop-filter:none; pointer-events:auto !important; }
.crop-box-wrap{position:relative;width:280px;height:280px;overflow:hidden;background:#111;border-radius:12px;pointer-events:auto !important;touch-action:none; transform:scale(0.9); transition:transform .4s var(--ease-spring);}
#crop-overlay.show .crop-box-wrap { transform:scale(1); }
#crop-img{position:absolute;top:0;left:0;transform-origin:0 0;cursor:move;user-select:none;touch-action:none;pointer-events:auto !important;}
.crop-mask{position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 999px rgba(0,0,0,.6);pointer-events:none;border:2px solid var(--gold)}
.crop-tips{color:#fff;font-size:12px;margin:14px 0 20px;opacity:.7;letter-spacing:1px; transform:translateY(10px); transition:transform .4s var(--ease-spring);}
#crop-overlay.show .crop-tips { transform:translateY(0); }
.crop-btns{display:flex;gap:12px;width:100%;max-width:280px;pointer-events:auto !important;}

/* 🌟 圖片預覽燈箱：絲滑彈出 */
#lb{z-index:999; background:rgba(0,0,0,.9); cursor:zoom-out; backdrop-filter:blur(8px);}
#lb img{max-width:92vw;max-height:92vh;border-radius:12px;transform:scale(0.85);transition:transform .4s var(--ease-spring);box-shadow:0 10px 40px rgba(0,0,0,.6);}
#lb.show img{transform:scale(1);}

/* 💻 小電腦/筆電版專屬螢幕優化 (螢幕高度低於 800px) */
@media(max-height: 800px), (max-width: 900px) {
  #s-home { padding: 15px; gap: 15px; }
  .big-title { font-size: 40px; }
  .logo-wrap { transform: scale(0.85); }
  .main-hero { padding: 15px 20px 5px; }
  .main-hero .logo-wrap { transform: scale(0.9); }
  .main-hero-t { font-size: 18px; margin-top: 8px; }
  .c-hdr { padding: 10px 16px; }
  .inp-area { padding: 10px 20px 14px; }
  .msgs { padding: 14px 20px; }

      if(key === me) continue;
      var u = users[key]; var avHtml = u.avatar ? '<img src="'+u.avatar+'">' : '🌼'; var bioText = u.bio || '來聊天吧！';
      html += '<div class="usr-row" onclick="openRoom(\'pm\',\''+key+'\')"><div class="mav">'+avHtml+'</div><div class="usr-info"><div class="usr-name">'+esc(key)+'</div><div class="usr-sub">'+esc(bioText)+'</div></div><div class="usr-arrow">❯</div></div>';
    }
    document.getElementById('user-list').innerHTML = html;
  });
}

function getChatId(u1, u2) { return [u1, u2].sort().join('_'); }

function openRoom(type, targetName) {
  currentRoom = type; currentTarget = targetName; shownKeys = {}; lastDate = null;
  document.getElementById('msgs').innerHTML = '<div class="wlc"><span>'+(type==='group'?'🌻':'🤫')+'</span>歡迎來到'+(type==='group'?'群組':'私密')+'聊天室<br><span style="color:#C8A882;font-size:12px">'+(type==='group'?'在這裡，你可以和全班說說話':'只有你和 '+esc(targetName)+' 能看到這裡的訊息')+'</span></div>';
  if (type === 'group') { document.getElementById('chat-title').textContent = '608 群組'; } 
  else { document.getElementById('chat-title').textContent = targetName; }
  show('s-chat'); startListen(); cancelReply();
}

function backToMain() { if (currentChatRef) { currentChatRef.off(); } show('s-main'); }

function saveSettings(){
  var nb=document.getElementById('set-bio').value.trim(); var np=document.getElementById('set-pwd').value.trim(); myBio=nb;
  document.getElementById('hbio-sub').textContent=myBio?myBio:'查看設置...'; var upData={bio:myBio,avatar:myAv};
  if(np){ var newId=mkId(me,np); myId=newId;myPwdRaw=np; localStorage.setItem('dandelion_id',newId); upData.identity=newId;upData.rawPwd=np; }
  if(db && me) db.ref('users/'+me).update(upData); document.getElementById('setting-overlay').classList.remove('show');
}
function doLogout(){ if(!confirm('確定要登出嗎？'))return; localStorage.clear(); location.reload(); }

(function(){
  var overlay=document.getElementById('crop-overlay');
  function start(x,y,dist){ isDragging=true;startX=x-imgX;startY=y-imgY;startDist=dist; }
  function move(x,y,dist){
    if(!isDragging)return; imgX=x-startX;imgY=y-startY;
    if(dist>0 && startDist>0){ var sc=dist/startDist;imgScale=Math.max(0.3,Math.min(4,imgScale*sc));startDist=dist; } updateCropTransform();
  }
  overlay.addEventListener('mousedown',function(e){if(e.target.closest('.crop-btns'))return; e.preventDefault(); start(e.clientX,e.clientY,0);});
  window.addEventListener('mousemove',function(e){if(isDragging){e.preventDefault(); move(e.clientX,e.clientY,0);}}, {passive:false});
  window.addEventListener('mouseup',function(){isDragging=false;});
  overlay.addEventListener('touchstart',function(e){
    if(e.target.closest('.crop-btns')) return; e.preventDefault();
    if(e.touches.length===1){ start(e.touches[0].clientX,e.touches[0].clientY,0); }
    else if(e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); start((e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2,d); }
  }, {passive: false});
  overlay.addEventListener('touchmove',function(e){
    if(e.target.closest('.crop-btns')) return; e.preventDefault();
    if(!isDragging)return; if(e.touches.length===1){ move(e.touches[0].clientX,e.touches[0].clientY,0); }
    else if(e.touches.length===2){ var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); move((e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2,d); }
  }, {passive: false});
  overlay.addEventListener('touchcancel',function(){isDragging=false;});
  overlay.addEventListener('touchend',function(){isDragging=false;});
})();

document.getElementById('set-av-file').addEventListener('change', function(e){
  var f=e.target.files[0]; this.value=''; if(!f)return;
  var r=new FileReader(); r.onload=function(ev){
    initCrop(ev.target.result, function(cData){
      myAv=cData; document.getElementById('set-av-img').src=myAv; document.getElementById('set-av-img').style.display='block';
      var hImg=document.getElementById('hav-img'); hImg.src=myAv; hImg.style.display='block';
    });
  }; r.readAsDataURL(f);
});

function initCrop(src, callback){
  cropSourceSrc=src;cropTargetHandler=callback; var cimg=document.getElementById('crop-img'); cimg.src=src;imgX=0;imgY=0;imgScale=1;isDragging=false;
  cimg.style.transform='translate(0px, 0px) scale(1)';
  cimg.onload=function(){
    var wrap=280; if(cimg.naturalWidth>cimg.naturalHeight){imgScale=wrap/cimg.naturalHeight;imgX=-(cimg.naturalWidth*imgScale-wrap)/2;}else{imgScale=wrap/cimg.naturalWidth;imgY=-(cimg.naturalHeight*imgScale-wrap)/2;} updateCropTransform();
  };
  document.getElementById('crop-overlay').classList.add('show');
}
function updateCropTransform(){ document.getElementById('crop-img').style.transform='translate('+imgX+'px, '+imgY+'px) scale('+imgScale+')'; }

function closeCrop(){document.getElementById('crop-overlay').classList.remove('show');}
function saveCrop(){
  var cimg=document.getElementById('crop-img'); var cv=document.createElement('canvas');cv.width=100;cv.height=100;
  cv.getContext('2d').drawImage(cimg, (-imgX)/imgScale, (-imgY)/imgScale, 280/imgScale, 280/imgScale, 0, 0, 100, 100);
  var data=cv.toDataURL('image/jpeg',0.82); if(cropTargetHandler)cropTargetHandler(data); closeCrop();
}

function startListen(){
  if(!db) return;
  if(currentChatRef) { currentChatRef.off(); }
  var path = (currentRoom === 'group') ? 'messages' : 'private_messages/' + getChatId(me, currentTarget);
  currentChatRef = db.ref(path);
  currentChatRef.on('child_added', function(snap){ 
    var k=snap.key; if(shownKeys[k])return; shownKeys[k]=true; 
    var d=snap.val(); if(!d)return; d.name==='__system__'?addSys(d.text):addBubble(d,k); 
  });
  currentChatRef.on('child_changed', function(snap){ 
    var d=snap.val(); if(!d||!d.recalled)return; var w=document.querySelector('[data-key="'+snap.key+'"]'); if(w)markRcl(w); 
  });
}

function pushMsg(obj){ 
  if(!db)return;
  var path = (currentRoom === 'group') ? 'messages' : 'private_messages/' + getChatId(me, currentTarget);
  var nr = db.ref(path).push(); 
  obj.timestamp=firebase.database.ServerValue.TIMESTAMP; nr.set(obj); 
}
function sysMsg(t){ 
  if(!db)return;
  var path = (currentRoom === 'group') ? 'messages' : 'private_messages/' + getChatId(me, currentTarget);
  var nr=db.ref(path).push(); nr.set({name:'__system__',type:'system',text:t,timestamp:firebase.database.ServerValue.TIMESTAMP});
}

function initReply(msgKey, name, snippet) {
  replyTargetId = msgKey; replyTargetName = name; replyTargetSnippet = snippet;
  var bar = document.getElementById('reply-bar'); var info = document.getElementById('reply-bar-info');
  info.textContent = '↩️ 回覆 ' + name + '：「' + snippet + '」'; bar.style.display = 'flex'; document.getElementById('msg-ta').focus();
}
function cancelReply(){ replyTargetId=null; document.getElementById('reply-bar').style.display='none'; }

function rclMsg(btn) {
  var mw = btn.closest('.mw'); if(!mw) return; var key = mw.getAttribute('data-key');
  if(key && db && confirm('確定要收回這條訊息嗎？')) {
    var path = (currentRoom === 'group') ? 'messages' : 'private_messages/' + getChatId(me, currentTarget);
    db.ref(path + '/' + key).update({recalled: true}); 
  }
}
function markRcl(mw) {
  var bbl = mw.querySelector('.bbl'); if(!bbl) return;
  bbl.style.transform = 'scale(0.95)';
  setTimeout(function(){
    bbl.className = 'bbl recalled'; bbl.innerHTML = '🌬️ 此訊息已收回';
    bbl.style.transform = 'scale(1)';
    var qa = mw.querySelector('.hvr-actions'); if(qa) qa.remove();
  }, 150);
}

function sendTxt(){
  var ta=document.getElementById('msg-ta'),txt=ta.value.trim(); if(!txt||!me)return;ta.value='';ta.style.height='auto';
  var m={name:me,type:'text',text:txt,avatar:myAv,deviceId:myId}; if(replyTargetId){ m.replyId = replyTargetId; m.replyName = replyTargetName; m.replySnippet = replyTargetSnippet; }
  pushMsg(m); cancelReply();
}
document.getElementById('snd-btn').addEventListener('click', sendTxt);
document.getElementById('msg-ta').addEventListener('input', function(){this.style.height='auto';this.style.height=this.scrollHeight+'px';});

document.getElementById('fi2').addEventListener('change',function(e){
  var file=e.target.files[0]; this.value=''; if(!file||!me)return; 
  var isImg=/^image\//i.test(file.type); if(file.size>900*1024&&!isImg){alert('檔案太大！');return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    if(isImg){
      var img=new Image();img.onload=function(){
        var cv=document.createElement('canvas');var MP=960;var w=img.width,h=img.height; if(w>MP||h>MP){if(w>h){h=Math.round(h*MP/w);w=MP;}else{w=Math.round(w*MP/h);h=MP;}}
        cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h); var data=cv.toDataURL('image/jpeg',.78);
        var m={name:me,type:'image',fileData:data,fileName:file.name,avatar:myAv,deviceId:myId}; if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
        pushMsg(m); cancelReply();
      };img.src=ev.target.result;
    } else {
      var m={name:me,type:'file',fileData:ev.target.result,fileName:file.name,avatar:myAv,deviceId:myId}; if(replyTargetId){ m.replyId=replyTargetId; m.replyName=replyTargetName; m.replySnippet=replyTargetSnippet; }
      pushMsg(m); cancelReply();
    }
  };reader.readAsDataURL(file);
});

function jumpToMessage(key) {
  var target = document.querySelector('[data-key="'+key+'"]');
  if(target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); target.style.outline = '2px dashed var(--gold)'; setTimeout(function(){ target.style.outline='none'; }, 2000); }
}

function handleMenuAction(e, callback) { e.preventDefault(); e.stopPropagation(); var mw = e.target.closest('.mw'); if(mw) mw.classList.remove('show-menu'); callback(); }

function openLb(src){ document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('show'); }
function closeLb(){ document.getElementById('lb').classList.remove('show'); }

function addBubble(d,key){
  var self=(d.name===me)&&(!d.deviceId||d.deviceId===myId);
  var rcld=!!d.recalled,ts=d.timestamp||Date.now(),av=d.avatar||''; var date=fmtD(ts);
  if(date!==lastDate){lastDate=date;var sep=document.createElement('div');sep.className='sysmsg';sep.innerHTML='<span>── '+date+' ──</span>';document.getElementById('msgs').appendChild(sep);}
  
  var w=document.createElement('div');w.className='mw '+(self?'self':'other'); if(key)w.setAttribute('data-key',key);
  var avH=av&&av.startsWith('data:')?'<div class="mav"><img src="'+av+'" alt=""></div>':'<div class="mav">🌼</div>';
  var quoteHtml = ''; if(!rcld && d.replyId){ quoteHtml = '<div class="quote-box" onclick="jumpToMessage(\''+d.replyId+'\')">↳ 回覆 ' + esc(d.replyName) + '：' + esc(d.replySnippet) + '</div>'; }

  var bb='';
  if(rcld){
    bb='<div class="bbl recalled">🌬️ 此訊息已收回</div>';
  } else if(d.type==='image'){
    bb='<div class="bbl" style="padding:6px">'+quoteHtml+'<img src="'+d.fileData+'" onclick="openLb(this.src)" alt="圖片"></div>';
  } else if(d.type==='file'){
    var fn = esc(d.fileName || '檔案');
    bb='<div class="bbl" style="padding:6px">'+quoteHtml+'<a class="file-box" href="'+d.fileData+'" download="'+fn+'"><div class="file-icon">📄</div><div class="file-info"><div class="file-name">'+fn+'</div><div class="file-sub">點擊下載檔案</div></div><div class="file-dl">⬇</div></a></div>';
  } else {
    bb='<div class="bbl">'+quoteHtml+esc(d.text||'')+'</div>';
  }
  
  var snippetText = d.type==='text'? (d.text||'') : (d.type==='image'?'📷 圖片':'📎 檔案');
  if(snippetText.length>14) snippetText = snippetText.slice(0,14) + '...';
  var escapedSnippet = snippetText.replace(/'/g, "\\'");

  var actionButtonsHtml = '';
  if(!rcld && key){
    actionButtonsHtml = '<div class="hvr-actions">';
    actionButtonsHtml += '<button class="action-btn rpl-act">回覆</button>';
    if(self){ actionButtonsHtml += '<button class="action-btn rcl-act">收回</button>'; }
    actionButtonsHtml += '</div>';
  }

  var row=self?'<div class="mw-row">'+actionButtonsHtml+avH+bb+'</div>':'<div class="mw-nm">'+esc(d.name)+'</div><div class="mw-row">'+avH+bb+actionButtonsHtml+'</div>';
  w.innerHTML=row+'<div class="mw-t">'+fmtT(ts)+'</div>';
  
  if(!rcld && key){
    var pressTimer; var bblBox = w.querySelector('.bbl');
    var startPress = function(e) { pressTimer = setTimeout(function() { if('vibrate' in navigator) navigator.vibrate(40); w.classList.add('show-menu'); }, 600); };
    var cancelPress = function() { clearTimeout(pressTimer); };
    bblBox.addEventListener('touchstart', startPress, {passive: true}); bblBox.addEventListener('touchend', cancelPress); bblBox.addEventListener('touchmove', cancelPress);
    bblBox.addEventListener('mousedown', startPress); bblBox.addEventListener('mouseup', cancelPress); bblBox.addEventListener('mouseleave', cancelPress);

    var rBtn = w.querySelector('.rpl-act'); if(rBtn){ rBtn.addEventListener('click', function(e){ handleMenuAction(e, function(){ initReply(key, d.name, escapedSnippet); }); }); rBtn.addEventListener('touchstart', function(e){ handleMenuAction(e, function(){ initReply(key, d.name, escapedSnippet); }); }); }
    var cBtn = w.querySelector('.rcl-act'); if(cBtn){ cBtn.addEventListener('click', function(e){ handleMenuAction(e, function(){ rclMsg(cBtn); }); }); cBtn.addEventListener('touchstart', function(e){ handleMenuAction(e, function(){ rclMsg(cBtn); }); }); }
  }

  document.getElementById('msgs').appendChild(w);
  requestAnimationFrame(function(){
    var m=document.getElementById('msgs');
    m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
  });
  return w;
}

function addSys(t){var sep=document.createElement('div');sep.className='sysmsg';sep.innerHTML='<span>'+esc(t)+'</span>';document.getElementById('msgs').appendChild(sep);var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}
function fmtT(ts){var d=new Date(ts);return('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtD(ts){var d=new Date(ts);return(d.getMonth()+1)+' 月 '+d.getDate()+' 日';}
</script>
