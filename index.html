<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>蒲公英 608</title><link rel="icon" type="image/png" href="favicon.png"><link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="蒲公英">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--cream:#FDFAF2;--gold:#D4A017;--gold-l:#E8B84B;--gold-p:rgba(212,160,23,0.08);--brown:#3D2C1A;--bm:#7A5C3A;--bl:#C8A882;--sh:rgba(61,44,26,0.1);--bg-card:rgba(255,255,255,0.85);--bg-input:rgba(255,255,255,0.7);--bg-input-f:rgba(255,255,255,0.95);--bg-hdr:rgba(253,250,242,0.85);--bbl-other:#FFFFFF;--bbl-self:#FFF8DC;--glass-border:1px solid rgba(255,255,255,0.6);--glass-blur:blur(16px);--ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-smooth:cubic-bezier(0.25,0.8,0.25,1);}
[data-theme="dark"]{--cream:#1F160E;--gold:#E8B84B;--gold-l:#F5D382;--gold-p:rgba(212,160,23,0.15);--brown:#F5EFEB;--bm:#D1BAA3;--bl:#A38563;--sh:rgba(0,0,0,0.4);--bg-card:rgba(43,31,20,0.85);--bg-input:rgba(61,44,26,0.6);--bg-input-f:rgba(77,56,34,0.8);--bg-hdr:rgba(31,22,14,0.85);--bbl-other:#2D1F14;--bbl-self:#4A3622;--glass-border:1px solid rgba(212,160,23,0.15);}
html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--brown);transition:background .3s var(--ease-smooth),color .3s var(--ease-smooth)}
.liquid-glass-modal{background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:var(--glass-border);box-shadow:0 12px 40px var(--sh);border-radius:24px;overflow:hidden;}
#seeds{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.seed{position:absolute;bottom:-20px;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{bottom:-20px;opacity:0;transform:translateX(0) rotate(0deg)}10%{opacity:.6}90%{opacity:.4}100%{bottom:110vh;opacity:0;transform:translateX(var(--dx)) rotate(400deg)}}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:10;background:transparent;opacity:1;visibility:visible;pointer-events:auto;transition:opacity .3s var(--ease-smooth),transform .3s var(--ease-smooth),visibility .3s;will-change:transform,opacity;}
.scr.off{opacity:0!important;visibility:hidden!important;pointer-events:none!important;transform:scale(0.97) translateY(15px)!important;}
.pill,.action-btn,.c-btn,.nb,.bk-btn,.snd-btn,.att-btn,.usr-row,.my-chip,.file-box,.t-opt,.post-card,.tab-btn{transition:all .2s var(--ease-smooth);will-change:transform;}
.pill:active,.c-btn:active,.nb:active,.bk-btn:active,.snd-btn:active,.att-btn:active,.usr-row:active,.my-chip:active,.file-box:active,.t-opt:active,.tab-btn:active{transform:scale(0.93)!important;opacity:0.8;transition:transform 0.1s;}
#s-home{gap:28px;padding:24px;z-index:20;justify-content:center;}
.logo-wrap{animation:sway 4s ease-in-out infinite;transform-origin:bottom center;}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.big-title{font-family:'Noto Serif TC',serif;font-size:52px;letter-spacing:10px;}
.big-sub{font-size:13px;color:var(--bl);letter-spacing:3px}
.home-btns{display:flex;gap:14px;margin-top:4px;z-index:30;pointer-events:auto;}
.pill{padding:14px 42px;border-radius:50px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none;letter-spacing:2px;user-select:none;}
.pill.pri{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;box-shadow:0 6px 18px rgba(212,160,23,.25);border:1px solid rgba(255,255,255,0.2);}
.pill.pri:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(212,160,23,.35)}
.pill.sec{background:var(--bg-input);color:var(--bm);border:1px solid rgba(212,160,23,.3);}
.pill.sec:hover{background:var(--gold-p)}
#s-steps{padding:0;z-index:30}
.stp-bar{width:100%;max-width:480px;display:flex;align-items:center;padding:20px 20px 0;flex-shrink:0}
.bk-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-card);border:1px solid rgba(212,160,23,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--bm);}
.bk-btn:hover{background:var(--gold-p)}
.dots{display:flex;gap:6px;margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(212,160,23,.25);transition:all .3s var(--ease-spring)}
.dot.on{background:var(--gold);width:22px}
.stp-body{flex:1;width:100%;max-width:480px;padding:14px 22px 22px;overflow:hidden}
.card{border-radius:28px;padding:36px 30px 28px;animation:cIn .4s var(--ease-spring);width:100%;background:var(--bg-card);box-shadow:0 8px 30px var(--sh);border:var(--glass-border);}
.card.rev{animation:cInR .4s var(--ease-spring);}
@keyframes cIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes cInR{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.c-lbl{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--bl);margin-bottom:8px}
.c-ttl{font-family:'Noto Serif TC',serif;font-size:24px;margin-bottom:6px}
.c-hint{font-size:13px;color:var(--bl);line-height:1.8;margin-bottom:24px}
.av-zone{display:flex;justify-content:center;margin:4px 0 18px}
.av-btn{width:100px;height:100px;border-radius:50%;background:var(--gold-p);border:2px dashed rgba(212,160,23,.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;overflow:hidden}
.av-btn:hover{border-color:var(--gold);transform:scale(1.03)}
.av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}
.av-cam{font-size:30px}.av-lbl{font-size:12px;color:var(--bl)}
.fi{width:100%;padding:14px 18px;border:1px solid rgba(212,160,23,.2);border-radius:18px;font-family:inherit;font-size:16px;color:var(--brown);background:var(--bg-input);outline:none;}
.fi:focus{border-color:var(--gold);background:var(--bg-input-f);box-shadow:0 0 0 4px rgba(212,160,23,.15);transform:translateY(-1px);}
.fi::placeholder{color:var(--bl)}
.ferr{font-size:12px;color:#C0392B;margin-top:10px;min-height:16px;font-weight:500;}
.nr{display:flex;justify-content:flex-end;margin-top:24px}
.nb{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(212,160,23,.25);}
.nb:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,160,23,.35);}
.nb svg{width:24px;height:24px;fill:#fff}
.m-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(212,160,23,.1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:70;}
.m-hdr-t{font-family:'Noto Serif TC',serif;font-size:22px;letter-spacing:2px;font-weight:700}
.my-chip{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;background:var(--gold-p);padding:5px 12px 5px 5px;border-radius:30px;border:1px solid rgba(212,160,23,.15);z-index:90;}
.my-chip:hover{transform:scale(1.03);background:rgba(212,160,23,0.15);}
.hav{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid rgba(212,160,23,.2)}
.hav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hname-box{display:flex;flex-direction:column;pointer-events:none;}
.hname{font-size:14px;color:var(--brown);font-weight:700;line-height:1.2}
.hbio-sub{font-size:11px;color:var(--bl);max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:65px;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-top:1px solid rgba(212,160,23,.15);border-radius:24px 24px 0 0;display:flex;z-index:80;transition:transform 0.3s var(--ease-smooth);will-change:transform;}
.bottom-nav.off{transform:translateY(100%);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:500;color:var(--bl);cursor:pointer;user-select:none;}
.tab-btn span.icon{font-size:20px;transition:transform 0.3s var(--ease-spring);}
.tab-btn.active{color:var(--gold);}
.tab-btn.active span.icon{transform:translateY(-3px) scale(1.15);}
#s-main,#s-feed,#s-board{padding-bottom:75px;}
.main-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px 10px;flex-shrink:0;animation:popInMessage .5s var(--ease-spring);}
.main-hero-t{font-family:'Noto Serif TC',serif;font-size:24px;color:var(--brown);letter-spacing:6px;font-weight:700;margin-top:14px;}
.main-hero-s{font-size:12px;color:var(--bl);letter-spacing:4px;margin-top:4px;}
.usr-list-wrap{flex:1;width:100%;overflow-y:auto;padding:10px 20px 20px;display:flex;flex-direction:column;gap:12px;max-width:600px;align-self:center;scroll-behavior:smooth;}
.usr-list-wrap::-webkit-scrollbar{width:0px}
.usr-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:20px;cursor:pointer;animation:popInMessage .4s var(--ease-spring) both;background:var(--bg-card);border:1px solid rgba(212,160,23,.15);box-shadow:0 4px 15px var(--sh);}
.usr-row:nth-child(1){animation-delay:0.05s;}
.usr-row:nth-child(2){animation-delay:0.1s;}
.usr-row:nth-child(n+3){animation-delay:0.15s;}
.usr-row:hover{background:var(--bg-input-f);border-color:var(--gold);transform:translateY(-2px);}
.usr-row.grp{background:linear-gradient(135deg,rgba(245,230,163,0.3),rgba(212,160,23,0.1));border-color:var(--gold-l);}
.usr-info{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.usr-name{font-size:16px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-sub{font-size:12px;color:var(--bl);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.usr-arrow{color:var(--gold);font-weight:700;opacity:0.6;font-size:18px;}
.usr-div{font-size:12px;color:var(--bl);letter-spacing:2px;font-weight:700;margin:12px 0 4px;padding-left:10px;}
.red-dot{position:absolute;top:-2px;right:-2px;width:12px;height:12px;background:#E74C3C;border-radius:50%;border:2px solid var(--cream);box-shadow:0 2px 4px rgba(231,76,60,0.4);z-index:5;}
.feed-list{flex:1;width:100%;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:20px;max-width:600px;align-self:center;}
.feed-list::-webkit-scrollbar{width:0px}

/* 🚀 已修復：貼文防壓縮與內建滑動 */
.post-card{flex-shrink:0;display:flex;flex-direction:column;border-radius:24px;padding:18px;animation:popInMessage .5s var(--ease-spring) both;background:var(--bg-card);border:1px solid rgba(212,160,23,.15);box-shadow:0 6px 20px var(--sh);overflow:hidden;}
.post-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.post-av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1px solid rgba(212,160,23,.2);background:var(--gold-p);}
.post-info{flex:1;}
.post-name{font-size:15px;font-weight:700;color:var(--brown);}
.post-time{font-size:11px;color:var(--bl);margin-top:2px;}
.post-text{font-size:15px;line-height:1.6;color:var(--brown);margin-bottom:12px;word-break:break-all;overflow-wrap:anywhere;max-height:200px;overflow-y:auto;padding-right:6px;}
.post-text::-webkit-scrollbar{width:4px;}
.post-text::-webkit-scrollbar-thumb{background:rgba(212,160,23,0.2);border-radius:4px;}

.post-media{width:100%;max-height:350px;object-fit:cover;border-radius:16px;margin-bottom:12px;border:1px solid rgba(212,160,23,.1);background:#000;}
.post-img{cursor:zoom-in;transition:transform .2s;}
.post-img:active{transform:scale(0.98);}
.post-ftr{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed rgba(212,160,23,.2);padding-top:12px;}
.like-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:14px;font-family:inherit;font-weight:500;color:var(--bm);cursor:pointer;padding:6px 12px;border-radius:20px;}
.like-btn:hover{background:var(--gold-p);transform:scale(1.05);}
.like-btn.liked{color:#E74C3C;}
.like-btn.liked span.heart{animation:heartBeat .4s var(--ease-spring);}
@keyframes heartBeat{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
.del-post-btn{color:#C0392B;background:rgba(192,57,43,0.1);border:none;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;}
.del-post-btn:active{transform:scale(0.9);}
.color-btn{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.2s;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.color-btn:active{transform:scale(0.8);}
.color-btn.active{border-color:rgba(255,255,255,0.9);box-shadow:0 0 0 2px var(--gold);transform:scale(1.15);}
.admin-card{border-radius:20px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:12px;background:var(--bg-card);box-shadow:0 4px 15px var(--sh);border:1px solid rgba(212,160,23,.15);}
.admin-info{flex:1;overflow:hidden;}
.admin-name{font-size:16px;font-weight:700;color:var(--brown);margin-bottom:6px;}
.admin-detail{font-size:12px;color:var(--bm);font-family:monospace;background:var(--bg-input);padding:4px 8px;border-radius:8px;display:inline-block;}
#s-chat{width:100%;align-items:stretch;padding:0;z-index:90}
.c-hdr{width:100%;background:var(--bg-hdr);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(212,160,23,.15);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.c-hdr-l{display:flex;align-items:center;gap:12px;padding-left:4px;}
.c-bk{font-size:24px;cursor:pointer;color:var(--gold);padding-right:6px;font-weight:700;}
.c-bk:active{transform:translateX(-6px) scale(0.9);}
.c-hdr-t{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:2px;font-weight:700;}
.msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;will-change:transform;}
.msgs::-webkit-scrollbar{width:0px}
.wlc{text-align:center;padding:30px 20px;color:var(--bl);font-size:13px;line-height:2;animation:popInMessage .6s var(--ease-spring);}
.wlc span{font-size:36px;display:block;margin-bottom:12px;animation:sway 4s infinite;}
@keyframes popInMessage{0%{opacity:0;transform:translateY(16px) scale(0.95);transform-origin:bottom center;}100%{opacity:1;transform:translateY(0) scale(1);transform-origin:bottom center;}}
@keyframes highlightPulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(212,160,23,0);}50%{transform:scale(1.03);box-shadow:0 0 0 8px rgba(212,160,23,0.3);}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(212,160,23,0);}}
.highlight-anim .bbl{animation:highlightPulse 1s var(--ease-spring);border-color:var(--gold)!important;}
.mw{position:relative;display:flex;flex-direction:column;max-width:75%;animation:popInMessage .4s cubic-bezier(0.25,0.8,0.25,1);will-change:transform,opacity;}
.mw.self{align-self:flex-end;align-items:flex-end;transform-origin:bottom right;}
.mw.other{align-self:flex-start;align-items:flex-start;transform-origin:bottom left;}
.mw-nm{font-size:11px;color:var(--bl);margin-bottom:4px;padding:0 6px;font-weight:500;}
.mw-row{display:flex;align-items:flex-end;gap:8px;max-width:100%;position:relative;}
.mw.self .mw-row{flex-direction:row-reverse}
.mav{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--gold-p);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(212,160,23,.15)}
.mav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.bbl{padding:12px 16px;border-radius:24px;font-size:15px;line-height:1.6;color:var(--brown);word-break:break-word;position:relative;display:flex;flex-direction:column;min-width:0;transition:all 0.2s;overflow:hidden;}
.mw.self .bbl{background:var(--bbl-self);border:1px solid rgba(212,160,23,.25);border-bottom-right-radius:6px;box-shadow:0 2px 10px rgba(212,160,23,.08);}
.mw.other .bbl{background:var(--bbl-other);border:1px solid rgba(61,44,26,.08);border-bottom-left-radius:6px;box-shadow:0 2px 10px var(--sh)}
.bbl.recalled{background:transparent!important;border:1px dashed rgba(200,168,130,.5)!important;color:var(--bl)!important;font-style:italic;box-shadow:none!important;}
.bbl-media{max-width:100%;max-height:250px;border-radius:16px;display:block;object-fit:cover;background:#000;border:1px solid rgba(212,160,23,.1);}
.bbl-img{cursor:zoom-in;}
.bbl-img:active{transform:scale(0.96);}
.mw-t{font-size:10px;color:var(--bl);margin-top:4px;padding:0 6px;letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.read-status{color:var(--gold);font-weight:700;font-size:10px;}
.file-box{display:flex;align-items:center;gap:12px;background:var(--bg-input);padding:10px 14px;border-radius:18px;border:1px solid rgba(212,160,23,.2);text-decoration:none;color:var(--brown);width:100%;max-width:260px;margin-top:4px;}
.file-box:hover{border-color:var(--gold);background:var(--gold-p);transform:translateY(-2px);}
.file-icon{font-size:28px;}
.file-info{flex:1;overflow:hidden;}
.file-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-sub{font-size:11px;color:var(--bl);margin-top:2px;}
.file-dl{width:32px;height:32px;border-radius:50%;background:var(--cream);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid rgba(212,160,23,.2);}
.file-box:hover .file-dl{background:var(--gold);color:#fff;border-color:var(--gold);}
.quote-box{background:var(--bg-input);border-left:4px solid var(--gold);padding:6px 10px;border-radius:10px;font-size:12px;color:var(--bm);margin-bottom:8px;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;pointer-events:auto;}
.quote-box:hover{background:var(--gold-p);transform:translateX(2px);}
.quote-box:active{transform:scale(0.97);}
.msg-opts-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--bl);font-size:16px;font-weight:700;cursor:pointer;opacity:0.7;user-select:none;background:var(--bg-input);margin-bottom:6px;flex-shrink:0;}
.msg-opts-btn:hover,.msg-opts-btn:active{opacity:1;background:var(--gold-p);color:var(--gold);transform:scale(1.1);}
.hvr-actions{position:absolute;top:50%;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:all .3s var(--ease-spring);z-index:50;}
.mw.self .hvr-actions{right:100%;transform:translateY(-50%) translateX(10px) scale(0.9);}
.mw.other .hvr-actions{left:100%;transform:translateY(-50%) translateX(-10px) scale(0.9);}
.mw.show-menu .hvr-actions{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0) scale(1);}
.mw.self.show-menu .hvr-actions{transform:translateY(-50%) translateX(-10px) scale(1);}
.mw.other.show-menu .hvr-actions{transform:translateY(-50%) translateX(10px) scale(1);}
.action-btn{background:var(--bg-card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(212,160,23,.3);border-radius:16px;padding:8px 16px;font-size:13px;color:var(--bm);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:700;box-shadow:0 6px 16px rgba(61,44,26,.15);}
.action-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);transform:translateY(-2px) scale(1.05);box-shadow:0 8px 20px rgba(212,160,23,.3);}
.sysmsg{text-align:center;font-size:12px;color:var(--bl);padding:4px 16px;}

#crop-overlay.show .crop-box-wrap{transform:scale(1);}
#crop-img{position:absolute;top:0;left:0;transform-origin:0 0;cursor:move;user-select:none;touch-action:none;}
.crop-mask{position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 999px rgba(0,0,0,.65);pointer-events:none;border:3px solid var(--gold)}
.crop-tips{color:#fff;font-size:13px;margin:20px 0 24px;opacity:.8;letter-spacing:2px;transform:translateY(15px);transition:transform .4s var(--ease-spring);}
#crop-overlay.show .crop-tips{transform:translateY(0);}
.crop-btns{display:flex;gap:16px;width:100%;max-width:300px;}
#lb{z-index:999;background:rgba(0,0,0,.85);cursor:zoom-out;}

#lb.show img{transform:scale(1);opacity:1;}

/* 🚀 橫向模式防呆遮罩 */
#landscape-warning{display:none;position:fixed;inset:0;background:var(--bg-card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);z-index:99999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
@media screen and (max-width:800px) and (orientation:landscape){

}

@media(max-height:800px),(max-width:900px){
#s-home{padding:15px;gap:15px;}.big-title{font-size:44px;}.logo-wrap{transform:scale(0.9);}.main-hero{padding:15px 20px 5px;}.main-hero-t{font-size:20px;margin-top:8px;}.usr-list-wrap,.feed-list{gap:14px;padding-bottom:10px;}.c-hdr{padding:12px 18px;}.inp-area{padding:10px 20px 18px;}.msgs{padding:16px 20px;}
}

.mw.show-menu .hvr-actions{transform:translateY(0) scale(1);}.action-btn{padding:8px 14px;font-size:13px;}.gif-panel{padding:12px;}.g-item{height:70px;}
}

function toggleMusic(play) {

  else { audio.pause(); document.getElementById('m-on').classList.remove('active'); document.getElementById('m-off').classList.add('active'); }
}

var REG=[{lbl:'1 / 5',ttl:'選一張大頭貼',hint:'點擊圖示裁切範圍 📷',type:'avatar'},{lbl:'2 / 5',ttl:'你的名字',hint:'請填入真實姓名',type:'text',id:'rn',ph:'輸入姓名',it:'text'},{lbl:'3 / 5',ttl:'Gmail 信箱 (選填)',hint:'沒有信箱可以直接按箭頭跳過喔！',type:'text',id:'rg',ph:'選填，可留空',it:'email'},{lbl:'4 / 5',ttl:'設定個人密碼',hint:'請記牢密碼！',type:'text',id:'rp',ph:'設定個人密碼',it:'password'},{lbl:'5 / 5',ttl:'班級密碼',hint:'輸入班級密碼 🌼',type:'text',id:'rc',ph:'輸入班級密碼',it:'password'}];
var LOG=[{lbl:'1 / 3',ttl:'你的名字',hint:'輸入註冊時的名字',type:'text',id:'ln',ph:'你的真實姓名',it:'text'},{lbl:'2 / 3',ttl:'個人密碼',hint:'輸入設定的個人密碼',type:'text',id:'lp',ph:'個人密碼',it:'password'},{lbl:'3 / 3',ttl:'班級密碼',hint:'輸入班級密碼',type:'text',id:'lc',ph:'班級密碼',it:'password'}];
function steps(){return flow==='register'?REG:LOG;}
function startFlow(f){flow=f;rAv='';rName='';rGmail='';rPwd='';lName='';lPwd='';stepIdx=0;show('s-steps');renderStep(0,false);}

function renderStep(idx,back){
  stepIdx=idx;var ss=steps(),s=ss[idx];var d=document.getElementById('dots');d.innerHTML='';
  ss.forEach(function(_,i){var el=document.createElement('div');el.className='dot'+(i===idx?' on':'');d.appendChild(el);});
  document.getElementById('bk-btn').style.visibility=idx===0?'hidden':'visible';
  var body='';
  if(s.type==='avatar'){body='<div class="av-zone"><div class="av-btn" id="avb" onclick="document.getElementById(\'av-file\').click()"><img id="av-img" alt=""><span class="av-cam" id="av-cam">📷</span><span class="av-lbl" id="av-lbl">點我選照片</span></div><input type="file" id="av-file" accept="image/*"></div>';}
  else{var sv={'rn':rName,'rg':rGmail,'rp':rPwd,'rc':'','ln':lName,'lp':lPwd,'lc':''}[s.id]||'';body='<input class="fi" id="sf" type="'+s.it+'" placeholder="'+s.ph+'" value="'+esc(sv)+'" autocomplete="off">';}
  body+='<div class="ferr" id="ferr"></div><div class="nr"><button class="nb" id="nb" onclick="nextStep()"><svg viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg></button></div>';
  document.getElementById('stp-body').innerHTML='<div class="card'+(back?' rev':'')+'"><div class="c-lbl">'+s.lbl+'</div><div class="c-ttl">'+s.ttl+'</div><div class="c-hint">'+s.hint+'</div>'+body+'</div>';
  if(s.type==='avatar'){
    if(rAv){var i=document.getElementById('av-img');i.src=rAv;i.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none';}
    document.getElementById('av-file').addEventListener('change',function(e){var f=e.target.files[0];this.value='';if(!f)return;var r=new FileReader();r.onload=function(ev){initCrop(ev.target.result,function(c){rAv=c;var el=document.getElementById('av-img');el.src=rAv;el.style.display='block';document.getElementById('av-cam').style.display='none';document.getElementById('av-lbl').style.display='none';});};r.readAsDataURL(f);});
  }else{setTimeout(function(){var f=document.getElementById('sf');if(f){f.focus();f.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();nextStep();}});}},80);}
}

function setErr(m){var e=document.getElementById('ferr');if(e)e.textContent=m;}
function goBack(){if(stepIdx===0){show('s-home');return;}renderStep(stepIdx-1,true);}
function mkId(n,p){var s=n+'|'+p,h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h)^s.charCodeAt(i);h=h>>>0;}return'id_'+h.toString(36);}

function nextStep(){
  var ss=steps(),s=ss[stepIdx];setErr('');
  if(s.type==='avatar'){stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();return;}
  var v=(document.getElementById('sf')||{}).value||'';v=v.trim();
  if(!v && s.id !== 'rg'){setErr('⚠️ 欄位不能空白');return;}
  if(s.id==='rn'){if(/[.#$\[\]]/.test(v)){setErr('❌ 名字不能包含特殊符號');return;}rName=v;}
  else if(s.id==='rg'){if(v&&!v.endsWith('@gmail.com')){setErr('❌ 請填寫正確的 Gmail');return;}rGmail=v;} 
  else if(s.id==='rp')rPwd=v; 
  else if(s.id==='rc'){if(v!==CLASS_CODE){setErr('❌ 密碼錯誤');return;}}
  else if(s.id==='ln')lName=v; 
  else if(s.id==='lp')lPwd=v; 
  else if(s.id==='lc'){if(v!==CLASS_CODE){setErr('❌ 密碼錯誤');return;}}
  stepIdx+1<ss.length?renderStep(stepIdx+1,false):doAuth();
}

function doAuth(){
  var nb=document.getElementById('nb');if(nb){nb.disabled=true;nb.innerHTML='…';}
  if(flow==='register'){
    var id=mkId(rName,rPwd);
    db.ref('users/'+rName).once('value',function(snap){if(snap.val()){renderStep(1,true);setTimeout(function(){setErr('❌ 名字已被使用');},100);return;}db.ref('users/'+rName).set({identity:id,avatar:rAv,gmail:rGmail,bio:'',rawPwd:rPwd});myPwdRaw=rPwd;enterApp(rName,id,rAv,true);});
  }else{
    var id2=mkId(lName,lPwd);
    db.ref('users/'+lName).once('value',function(snap){var d=snap.val();if(!d){setErr('❌ 帳號不存在');if(nb){nb.disabled=false;nb.innerHTML='→';}return;}if(d.identity!==id2){setErr('❌ 密碼錯誤');if(nb){nb.disabled=false;nb.innerHTML='→';}return;}if(d.avatar){rAv=d.avatar;}myBio=d.bio||'';myPwdRaw=d.rawPwd||lPwd;enterApp(lName,id2,d.avatar||'',false);});
  }
}

function enterApp(name,id,av,isNew){
  me=name;myId=id;myAv=av;localStorage.setItem('dandelion_me',name);localStorage.setItem('dandelion_id',id);

  var row=self?`<div class="mw-row">${actH}${optH}${bb}</div>`:`<div class="mw-nm">${esc(d.name)}</div><div class="mw-row">${avH}${bb}${optH}${actH}</div>`;
  w.innerHTML=row+`<div class="mw-t">${rH}<span>${fmtT(ts)}</span></div>`;
  if(!rcld&&key){var rB=w.querySelector('.rpl-act');if(rB){rB.addEventListener('click',e=>handleMenuAction(e,()=>initReply(key,d.name,snip)));rB.addEventListener('touchstart',e=>handleMenuAction(e,()=>initReply(key,d.name,snip)),{passive:false});}var cB=w.querySelector('.rcl-act');if(cB){cB.addEventListener('click',e=>handleMenuAction(e,()=>rclMsg(cB)));cB.addEventListener('touchstart',e=>handleMenuAction(e,()=>rclMsg(cB)),{passive:false});}}
  document.getElementById('msgs').appendChild(w);requestAnimationFrame(()=>{var m=document.getElementById('msgs');m.scrollTo({top:m.scrollHeight,behavior:'smooth'});});return w;
}
function addSys(t){var s=document.createElement('div');s.className='sysmsg';s.innerHTML='<span>'+esc(t)+'</span>';document.getElementById('msgs').appendChild(s);var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function fmtT(ts){var d=new Date(ts);return('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function fmtD(ts){var d=new Date(ts);return(d.getMonth()+1)+' 月 '+d.getDate()+' 日';}
function resetAllChats(){if(me!==ADMIN_NAME)return;if(confirm('警告：確定清空所有資料？')&&prompt('輸入「確認清空」')==='確認清空'){if(db){db.ref('messages').remove();db.ref('private_messages').remove();db.ref('custom_group_messages').remove();db.ref('posts').remove();db.ref('whiteboard/strokes').remove();alert('清空完成');location.reload();}}}
function deleteCustomGroup(){if(confirm('解散群組？')){if(db&&currentGroupId){db.ref('custom_group_messages/'+currentGroupId).remove();db.ref('groups/'+currentGroupId).remove();alert('已解散！');backToMain();}}}

/* 高效防卡頓渲染白板引擎 */
function getWbPos(e){var r=wbCanvas.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx-r.left)*(WB_WIDTH/r.width),y:(cy-r.top)*(WB_HEIGHT/r.height)};}
function requestRender(){if(!renderPending){renderPending=true;requestAnimationFrame(()=>{renderWhiteboard();renderPending=false;});}}
function startDrawWb(e){if(amIMuted)return;if(e.touches&&e.touches.length>1)return;e.preventDefault();isDrawingWb=true;var p=getWbPos(e);currentPath=[Math.round(p.x)+','+Math.round(p.y)];wbLastX=p.x;wbLastY=p.y;}
function drawWb(e){
  if(!isDrawingWb)return;e.preventDefault();var p=getWbPos(e);currentPath.push(Math.round(p.x)+','+Math.round(p.y));
  if(wbMode==='pen'){
    wbCtx.beginPath();wbCtx.moveTo(wbLastX,wbLastY);wbCtx.lineTo(p.x,p.y);
    wbCtx.lineCap='round';wbCtx.lineJoin='round';wbCtx.lineWidth=wbSize;wbCtx.strokeStyle=wbColor;wbCtx.stroke();
  } else { requestRender(); }
  wbLastX=p.x;wbLastY=p.y;
}
function endDrawWb(e){if(!isDrawingWb)return;isDrawingWb=false;if(currentPath.length>0){if(db)db.ref('whiteboard/strokes').push({a:me,c:wbMode==='eraser'?'eraser':wbColor,s:wbSize,p:currentPath.join('|')});currentPath=[];}}
wbCanvas.addEventListener('mousedown',startDrawWb);wbCanvas.addEventListener('mousemove',drawWb);wbCanvas.addEventListener('mouseup',endDrawWb);wbCanvas.addEventListener('mouseout',endDrawWb);
wbCanvas.addEventListener('touchstart',startDrawWb,{passive:false});wbCanvas.addEventListener('touchmove',drawWb,{passive:false});wbCanvas.addEventListener('touchend',endDrawWb);wbCanvas.addEventListener('touchcancel',endDrawWb);

function renderWhiteboard(){
  wbCtx.clearRect(0,0,WB_WIDTH,WB_HEIGHT);var sba={};for(var k in allStrokes){var s=allStrokes[k];if(!sba[s.a])sba[s.a]=[];sba[s.a].push(s);}
  if(isDrawingWb&&currentPath.length>0){if(!sba[me])sba[me]=[];sba[me].push({a:me,c:wbMode==='eraser'?'eraser':wbColor,s:wbSize,p:currentPath.join('|')});}
  for(var a in sba){
    tempCtx.clearRect(0,0,WB_WIDTH,WB_HEIGHT);
    sba[a].forEach(s=>{
      var pts=s.p.split('|');if(!pts||!pts[0])return;
      tempCtx.beginPath();var st=pts[0].split(',');tempCtx.moveTo(parseFloat(st[0]),parseFloat(st[1]));
      for(var i=1;i<pts.length;i++){var pt=pts[i].split(',');tempCtx.lineTo(parseFloat(pt[0]),parseFloat(pt[1]));}
      if(pts.length===1)tempCtx.lineTo(parseFloat(st[0])+0.1,parseFloat(st[1]));
      tempCtx.lineCap='round';tempCtx.lineJoin='round';
      if(s.c==='eraser'){tempCtx.globalCompositeOperation='destination-out';tempCtx.lineWidth=s.s||30;tempCtx.strokeStyle='rgba(0,0,0,1)';}
      else{tempCtx.globalCompositeOperation='source-over';tempCtx.lineWidth=s.s||3;tempCtx.strokeStyle=s.c||'#3D2C1A';}
      tempCtx.stroke();
    });
    wbCtx.globalCompositeOperation='source-over';wbCtx.drawImage(tempCanvas,0,0);
  }
}
function initWhiteboardSync(){if(!db)return;if(wbRef)wbRef.off();wbRef=db.ref('whiteboard/strokes');wbRef.on('value',s=>{allStrokes=s.val()||{};requestRender();});}
function clearBoard(){if(me!==ADMIN_NAME){alert('僅管理員可用');return;}if(confirm('清空畫布？'))if(db)db.ref('whiteboard/strokes').remove();}
function updateWbSize(val){wbSize=parseInt(val);if(wbMode==='pen')lastPenSize=wbSize;}
function setDrawMode(mode){wbMode=mode;var pB=document.getElementById('wb-pen-btn'),eB=document.getElementById('wb-eraser-btn'),sd=document.getElementById('wb-size-slider');if(mode==='pen'){pB.style.background='var(--gold)';pB.style.color='#fff';pB.style.borderColor='var(--gold)';eB.style.background='transparent';eB.style.color='var(--bm)';eB.style.borderColor='var(--gold-p)';wbSize=lastPenSize;sd.value=wbSize;wbCanvas.style.cursor='crosshair';}else{lastPenSize=wbSize;eB.style.background='var(--gold)';eB.style.color='#fff';eB.style.borderColor='var(--gold)';pB.style.background='transparent';pB.style.color='var(--bm)';pB.style.borderColor='var(--gold-p)';wbSize=30;sd.value=wbSize;wbCanvas.style.cursor='cell';}}
function setWbColor(color,idx){wbColor=color;setDrawMode('pen');for(var i=1;i<=5;i++)document.getElementById('cbtn-'+i).classList.remove('active');document.getElementById('cbtn-'+idx).classList.add('active');}
</script>
